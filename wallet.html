<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0f0f13; --bg2: #1a1a23; --bg3: #222230; --accent: #00ff88; --red: #ff4757; --gold: #ffd700; --text: #fff; --text2: #888; --border: #2a2a35; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; }
.logo { font-size: 1.5rem; font-weight: 700; padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.logo span { color: var(--accent); }
.nav-section { padding: 0 16px; margin-bottom: 20px; }
.nav-label { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
.nav-link { display: block; padding: 10px 12px; border-radius: 8px; color: var(--text); text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
.nav-link:hover { background: var(--bg3); }
.nav-link.active { background: var(--accent); color: #000; }
.main { flex: 1; padding: 30px; overflow-y: auto; }
.balance-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.balance-info h2 { font-size: 0.9rem; color: var(--text2); margin-bottom: 8px; }
.balance-amount { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
.balance-usd { color: var(--text2); font-size: 0.9rem; }
.actions { display: flex; gap: 12px; }
.action-btn { padding: 12px 24px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; }
.action-btn.deposit { background: var(--accent); color: #000; }
.action-btn.withdraw { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

.wallet-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
.transactions { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }
.tx-list { max-height: 400px; overflow-y: auto; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.tx-item:last-child { border-bottom: none; }
.tx-info { display: flex; align-items: center; gap: 12px; }
.tx-icon { width: 36px; height: 36px; background: var(--bg3); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.tx-type { font-weight: 600; }
.tx-date { font-size: 0.8rem; color: var(--text2); }
.tx-amount { text-align: right; }
.tx-amount.positive { color: var(--accent); }
.tx-amount.negative { color: var(--red); }

.assets { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.asset-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.asset-item:last-child { border-bottom: none; }
.asset-info { display: flex; align-items: center; gap: 12px; }
.asset-icon { width: 32px; height: 32px; background: var(--bg3); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.asset-name { font-weight: 600; }
.asset-symbol { font-size: 0.8rem; color: var(--text2); }
.asset-balance { text-align: right; }
.asset-value { font-weight: 600; }
.asset-usd { font-size: 0.8rem; color: var(--text2); }

.deposit-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; }
.modal-content { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 30px; width: 400px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 1.5rem; cursor: pointer; }
.modal-input { width: 100%; padding: 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; margin-bottom: 12px; }
.qr-section { background: #fff; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
.qr-section img { width: 150px; height: 150px; }
.address-display { background: var(--bg3); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; word-break: break-all; text-align: center; }

@media(max-width: 768px) { .sidebar { display: none; } .wallet-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">FRESH<span>FLIP</span></div>
    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="vip.html">VIP</a>
      <a class="nav-link active" href="wallet.html">Wallet</a>
      <a class="nav-link" href="leaderboard.html">Leaderboard</a>
      <a class="nav-link" href="faq.html">Help</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Legal</div>
      <a class="nav-link" href="tos.html">Terms</a>
      <a class="nav-link" href="privacy.html">Privacy</a>
    </div>
  </div>
  <div class="main">
    <div class="balance-section">
      <div class="balance-info">
        <h2>Total Balance</h2>
        <div class="balance-amount" id="total-balance">$0</div>
        <div class="balance-usd" id="total-usd">≈ $0 USD</div>
      </div>
      <div class="actions">
        <button class="action-btn deposit" onclick="showDeposit()">Deposit</button>
        <button class="action-btn withdraw" onclick="showWithdraw()">Withdraw</button>
      </div>
    </div>
    <div class="wallet-grid">
      <div class="transactions">
        <div class="section-title">Recent Transactions</div>
        <div class="tx-list" id="tx-list"></div>
      </div>
      <div class="assets">
        <div class="section-title">Assets</div>
        <div class="asset-item">
          <div class="asset-info">
            <div class="asset-icon">₿</div>
            <div><div class="asset-name">Bitcoin</div><div class="asset-symbol">BTC</div></div>
          </div>
          <div class="asset-balance"><div class="asset-value" id="btc-balance">0 BTC</div><div class="asset-usd" id="btc-usd">$0</div></div>
        </div>
        <div class="asset-item">
          <div class="asset-info">
            <div class="asset-icon">Ξ</div>
            <div><div class="asset-name">Ethereum</div><div class="asset-symbol">ETH</div></div>
          </div>
          <div class="asset-balance"><div class="asset-value" id="eth-balance">0 ETH</div><div class="asset-usd" id="eth-usd">$0</div></div>
        </div>
        <div class="asset-item">
          <div class="asset-info">
            <div class="asset-icon">₮</div>
            <div><div class="asset-name">Tether</div><div class="asset-symbol">USDT</div></div>
          </div>
          <div class="asset-balance"><div class="asset-value" id="usdt-balance">0 USDT</div><div class="asset-usd" id="usdt-usd">$0</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="deposit-modal" id="deposit-modal">
  <div class="modal-content">
    <div class="modal-header"><h3>Deposit Crypto</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="form-group" style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 8px; color: var(--text2); font-size: 0.85rem;">Select Currency</label>
      <select class="modal-input" id="deposit-currency">
        <option value="btc">Bitcoin (BTC)</option>
        <option value="eth">Ethereum (ETH)</option>
        <option value="usdt">Tether (USDT)</option>
      </select>
    </div>
    <div class="qr-section"><div style="width: 150px; height: 150px; background: #fff; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: #000;">QR Code</div></div>
    <div class="address-display" id="deposit-address">bc1qxy2kgdygjrgqkx2vc6dvy66lw5f22kfxzdmau</div>
    <button class="action-btn deposit" style="width: 100%; margin-top: 16px;" onclick="copyAddress()">Copy Address</button>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
const transactions = [
  { type: 'Deposit', amount: 5000, icon: '↓', date: 'Apr 25, 2026' },
  { type: 'Bet Win', amount: 250, icon: '↑', date: 'Apr 25, 2026' },
  { type: 'Bet Loss', amount: -100, icon: '↓', date: 'Apr 25, 2026' },
  { type: 'Withdraw', amount: -1000, icon: '↑', date: 'Apr 24, 2026' },
  { type: 'Bet Win', amount: 500, icon: '↑', date: 'Apr 24, 2026' },
  { type: 'Deposit', amount: 2000, icon: '↓', date: 'Apr 23, 2026' },
];

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) { location.href = 'login.html'; return; }
  document.getElementById('total-balance').textContent = '$' + window.balance.toLocaleString();
  document.getElementById('total-usd').textContent = '≈ $' + window.balance.toLocaleString() + ' USD';
  renderTransactions();
}

function renderTransactions() {
  const list = document.getElementById('tx-list');
  list.innerHTML = '';
  transactions.forEach(tx => {
    const isPositive = tx.amount > 0;
    list.innerHTML += `<div class="tx-item">
      <div class="tx-info">
        <div class="tx-icon">${tx.icon}</div>
        <div><div class="tx-type">${tx.type}</div><div class="tx-date">${tx.date}</div></div>
      </div>
      <div class="tx-amount ${isPositive ? 'positive' : 'negative'}">${isPositive ? '+' : ''}$${Math.abs(tx.amount)}</div>
    </div>`;
  });
}

function showDeposit() {
  document.getElementById('deposit-modal').style.display = 'flex';
}

function showWithdraw() {
  alert('Withdrawal feature coming soon!');
}

function closeModal() {
  document.getElementById('deposit-modal').style.display = 'none';
}

function copyAddress() {
  const addr = document.getElementById('deposit-address').textContent;
  navigator.clipboard.writeText(addr);
  alert('Address copied!');
}

init();
</script>
</body>
</html>
