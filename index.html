<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1923;--surface:#1a2634;--surface2:#213040;--border:#2a3f52;--accent:#00e701;--accent2:#00b300;--text:#e8f4f8;--muted:#7a9bb5;--red:#ff4757;--gold:#f5a623;--blue:#1e90ff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
  #auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;max-width:95vw;}
  .auth-logo{text-align:center;margin-bottom:32px;}
  .auth-logo h1{font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;color:var(--accent);letter-spacing:2px;}
  .auth-logo p{color:var(--muted);font-size:0.8rem;margin-top:4px;letter-spacing:3px;text-transform:uppercase;}
  .auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
  .auth-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:500;transition:all .2s;}
  .auth-tab.active{background:var(--surface2);color:var(--text);}
  .auth-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.95rem;margin-bottom:12px;outline:none;transition:border .2s;}
  .auth-input:focus{border-color:var(--accent);}
  .auth-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:4px;}
  .auth-btn:hover:not(:disabled){background:var(--accent2);}
  .auth-btn:disabled{opacity:.5;cursor:not-allowed;}
  .auth-msg{font-size:0.82rem;text-align:center;margin-top:12px;min-height:18px;}
  .auth-msg.err{color:var(--red);}
  .auth-msg.ok{color:var(--accent);}
  #app{display:none;flex-direction:column;min-height:100vh;}
  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .nav-logo{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:2px;}
  .nav-balance{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 16px;}
  .nav-balance span{color:var(--muted);font-size:0.8rem;}
  .nav-balance strong{color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-user{color:var(--muted);font-size:0.85rem;}
  .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;transition:all .2s;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}
  .layout{display:flex;flex:1;}
  aside{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;}
  .sidebar-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;color:var(--muted);font-size:0.9rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;}
  .sidebar-item:hover{color:var(--text);background:var(--surface2);}
  .sidebar-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--surface2);}
  main{flex:1;padding:28px;overflow-y:auto;}
  .game-panel{display:none;}
  .game-panel.active{display:block;}
  .game-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:600px;margin:0 auto;}
  .game-title{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:4px;}
  .game-subtitle{color:var(--muted);font-size:0.82rem;margin-bottom:24px;}
  .bet-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
  .bet-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:1rem;outline:none;}
  .bet-input:focus{border-color:var(--accent);}
  .bet-quick{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .bet-quick button{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:0.8rem;transition:all .2s;}
  .bet-quick button:hover{border-color:var(--accent);color:var(--accent);}
  .play-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:#000;font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
  .play-btn:hover:not(:disabled){background:var(--accent2);transform:translateY(-2px);}
  .play-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .result-box{margin-top:20px;padding:16px;border-radius:12px;text-align:center;display:none;}
  .result-box.win{background:rgba(0,231,1,.1);border:1px solid rgba(0,231,1,.3);display:block;}
  .result-box.lose{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);display:block;}
  .result-amount{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;}
  .result-box.win .result-amount{color:var(--accent);}
  .result-box.lose .result-amount{color:var(--red);}
  .result-msg{color:var(--muted);font-size:0.85rem;margin-top:4px;}
  .coin-container{display:flex;justify-content:center;margin:24px 0;}
  .coin{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;border:4px solid var(--border);background:var(--surface2);}
  .coin.heads{border-color:var(--gold);background:rgba(245,166,35,.1);}
  .coin.tails{border-color:var(--blue);background:rgba(30,144,255,.1);}
  @keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(900deg)}100%{transform:rotateY(1800deg)}}
  .coin.flipping{animation:flip 0.8s ease-in-out;}
  .side-btns{display:flex;gap:10px;margin-bottom:16px;}
  .side-btn{flex:1;padding:12px;border:2px solid var(--border);background:transparent;border-radius:10px;cursor:pointer;color:var(--muted);font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:500;transition:all .2s;}
  .side-btn.active[data-side="heads"]{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,.1);}
  .side-btn.active[data-side="tails"]{border-color:var(--blue);color:var(--blue);background:rgba(30,144,255,.1);}
  .mines-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:20px 0;}
  .mine-cell{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:all .2s;}
  .mine-cell:hover:not(.revealed){border-color:var(--accent);background:rgba(0,231,1,.08);transform:scale(1.05);}
  .mine-cell.gem{border-color:var(--accent);background:rgba(0,231,1,.15);}
  .mine-cell.bomb{border-color:var(--red);background:rgba(255,71,87,.15);}
  .mine-cell.revealed{cursor:default;transform:none!important;}
  .mines-info{display:flex;justify-content:space-between;margin-bottom:16px;}
  .mines-stat{text-align:center;}
  .mines-stat label{color:var(--muted);font-size:0.75rem;display:block;margin-bottom:2px;}
  .mines-stat strong{font-family:'Rajdhani',sans-serif;font-size:1.2rem;color:var(--accent);}
  .mines-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;}
  .cashout-btn{width:100%;margin-top:8px;padding:13px;background:var(--gold);border:none;border-radius:10px;color:#000;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .cashout-btn:hover:not(:disabled){opacity:.85;}
  .cashout-btn:disabled{opacity:.4;cursor:not-allowed;}
  .roulette-wheel{position:relative;width:220px;height:220px;margin:0 auto 24px;}
  .wheel-svg{width:100%;height:100%;}
  .wheel-arrow{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:1.5rem;z-index:2;}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(1800deg)}}
  .roulette-bets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .roulette-bet-btn{padding:12px 8px;border:2px solid var(--border);background:transparent;border-radius:10px;cursor:pointer;color:var(--muted);font-size:0.82rem;font-weight:500;transition:all .2s;text-align:center;}
  .roulette-bet-btn[data-bet="red"].active{border-color:#e53e3e;background:rgba(229,62,62,.2);color:#fc8181;}
  .roulette-bet-btn[data-bet="black"].active{border-color:#718096;background:rgba(113,128,150,.2);color:#cbd5e0;}
  .roulette-bet-btn[data-bet="green"].active{border-color:var(--accent);background:rgba(0,231,1,.1);color:var(--accent);}
  .roulette-bet-btn[data-bet="odd"].active{border-color:var(--blue);background:rgba(30,144,255,.1);color:#63b3ed;}
  .roulette-bet-btn[data-bet="even"].active{border-color:var(--gold);background:rgba(245,166,35,.1);color:var(--gold);}
  .roulette-bet-btn[data-bet="1-18"].active{border-color:#9f7aea;background:rgba(159,122,234,.1);color:#b794f4;}
  .roulette-bet-btn[data-bet="19-36"].active{border-color:#ed8936;background:rgba(237,137,54,.1);color:#fbd38d;}
  .roulette-number{display:none;width:60px;height:60px;border-radius:50%;margin:0 auto 16px;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;border:3px solid;}
  .roulette-number.show{display:flex;}
  .roulette-number.red{border-color:#e53e3e;background:rgba(229,62,62,.2);color:#fc8181;}
  .roulette-number.black{border-color:#718096;background:rgba(113,128,150,.2);color:#cbd5e0;}
  .roulette-number.green{border-color:var(--accent);background:rgba(0,231,1,.1);color:var(--accent);}
  @media(max-width:600px){aside{display:none;}.game-card{padding:16px;}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>FRESHFLIP</h1>
      <p>FreshSMP Casino</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>

    <div id="login-form">

</div>

<div id="app">
  <nav>
    <div class="nav-logo">⚡ FRESHFLIP</div>

      <span class="nav-user" id="nav-user"></span>

  <div class="layout">

    <main>

      <div class="game-panel active" id="panel-coinflip">

            <button class="side-btn active" data-side="heads" onclick="selectSide('heads')">👑 Heads</button>
            <button class="side-btn" data-side="tails" onclick="selectSide('tails')">🌊 Tails</button>
          </div>
          <div class="coin-container"><div class="coin heads" id="coin">👑</div></div>
          <div class="bet-row"><input class="bet-input" id="cf-bet" type="number" placeholder="Bet amount" min="1"></div>
          <div class="bet-quick">
            <button onclick="setBet('cf-bet',10)">$10</button>
            <button onclick="setBet('cf-bet',50)">$50</button>

      <div class="game-panel" id="panel-mines">

          <div class="game-title">💣 Mines</div>
          <div class="game-subtitle">Reveal gems — avoid bombs</div>
          <select class="mines-select" id="mines-count">
            <option value="3">3 Mines</option>
            <option value="5" selected>5 Mines</option>
            <option value="10">10 Mines</option>
            <option value="15">15 Mines</option>
          </select>
          <div class="bet-row"><input class="bet-input" id="mines-bet" type="number" placeholder="Bet amount" min="1"></div>
          <div class="bet-quick">
            <button onclick="setBet('mines-bet',10)">$10</button>
            <button onclick="setBet('mines-bet',50)">$50</button>
            <button onclick="setBet('mines-bet',100)">$100</button>
            <button onclick="halfBet('mines-bet')">½</button>
            <button onclick="doubleBet('mines-bet')">2×</button>

          <button class="play-btn" id="mines-start-btn" onclick="startMines()">START GAME</button>
          <div class="mines-info" id="mines-info" style="display:none">
            <div class="mines-stat"><label>Multiplier</label><strong id="mines-multi">1.00x</strong></div>
            <div class="mines-stat"><label>Profit</label><strong id="mines-profit">$0</strong></div>
            <div class="mines-stat"><label>Gems</label><strong id="mines-gems">0</strong></div>
          </div>
          <div class="mines-grid" id="mines-grid"></div>
          <button class="cashout-btn" id="mines-cashout" disabled onclick="cashoutMines()">CASH OUT</button>
          <div class="result-box" id="mines-result"><div class="result-amount" id="mines-result-amount"></div><div class="result-msg" id="mines-result-msg"></div></div>

      <div class="game-panel" id="panel-roulette">

            <button class="roulette-bet-btn" data-bet="even" onclick="selectRBet('even')">Even (2x)</button>

          <div class="bet-quick">

            <button onclick="setBet('r-bet',50)">$50</button>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<script>
// ===================== CONFIG =====================
const SUPABASE_URL = 'https://ghaojptkyxxvxdzmdzpk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7P8N45QLtr-RIvapvUVnPg_4yWwE615';
// ==================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let balance = 0;

function switchTab(t) {
  document.getElementById('login-form').style.display = t==='login'?'block':'none';
  document.getElementById('signup-form').style.display = t==='signup'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='signup'&&i===1)));
  setMsg('','');
}

function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.className = 'auth-msg' + (type?' '+type:'');
  el.textContent = msg;
}

async function signup() {
  const u = document.getElementById('signup-user').value.trim();
  const p = document.getElementById('signup-pass').value;
  if (!u||!p) { setMsg('Fill all fields.','err'); return; }
  if (u.length<3) { setMsg('Username min 3 chars.','err'); return; }
  if (p.length<6) { setMsg('Password min 6 chars.','err'); return; }
  const btn = document.getElementById('signup-btn');
  btn.disabled=true; btn.textContent='Creating...';
  try {
    const hash = await bcrypt.hash(p, 10);
    const {error} = await sb.from('users').insert({username:u, password:hash, balance:1000});
    if (error) { setMsg(error.code==='23505'?'Username already taken.':'Error: '+error.message,'err'); return; }
    setMsg('Account created! Logging you in...','ok');
    // auto-login
    document.getElementById('login-user').value = u;
    document.getElementById('login-pass').value = p;
    setTimeout(()=>login(), 800);
  } catch(e) {
    setMsg('Unexpected error: '+e.message,'err');
  } finally {
    btn.disabled=false; btn.textContent='CREATE ACCOUNT';
  }
}

async function login() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u||!p) { setMsg('Fill all fields.','err'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Logging in...';
  try {
    const {data, error} = await sb.from('users').select('*').eq('username', u).maybeSingle();
    if (error) { setMsg('DB error: '+error.message,'err'); return; }
    if (!data) { setMsg('Username not found.','err'); return; }
    const ok = await bcrypt.compare(p, data.password);
    if (!ok) { setMsg('Wrong password.','err'); return; }
    currentUser = data;
    balance = data.balance;
    enterApp();
  } catch(e) {
    setMsg('Unexpected error: '+e.message,'err');
  } finally {
    btn.disabled=false; btn.textContent='LOGIN';
  }
}

function enterApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('nav-user').textContent = currentUser.username;
  updateBalanceUI(balance);
}

function logout() {
  currentUser=null; balance=0;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

async function saveBalance() {
  if (!currentUser) return;
  await sb.from('users').update({balance}).eq('id', currentUser.id);
}

function updateBalanceUI(b) {
  balance = Math.max(0, b);
  document.getElementById('nav-balance').textContent = '$'+balance.toLocaleString();
}

function showGame(g, el) {
  document.querySelectorAll('.game-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));
  document.getElementById('panel-'+g).classList.add('active');
  el.classList.add('active');
}

function setBet(id,v){document.getElementById(id).value=v;}
function halfBet(id){const v=parseFloat(document.getElementById(id).value)||0;document.getElementById(id).value=Math.max(1,Math.floor(v/2));}
function doubleBet(id){const v=parseFloat(document.getElementById(id).value)||0;document.getElementById(id).value=Math.floor(v*2);}
function getBet(id){return Math.floor(parseFloat(document.getElementById(id).value)||0);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function showResult(prefix, win, amount, msg) {
  const box = document.getElementById(prefix+'-result');
  box.className = 'result-box '+(win?'win':'lose');
  document.getElementById(prefix+'-result-amount').textContent = (win?'+':'-')+'$'+Math.abs(amount).toLocaleString();
  document.getElementById(prefix+'-result-msg').textContent = msg;
}

// COINFLIP
let cfSide = 'heads';
function selectSide(s) {
  cfSide=s;
  document.querySelectorAll('.side-btn').forEach(b=>b.classList.toggle('active',b.dataset.side===s));
  const coin=document.getElementById('coin');
  coin.className='coin '+(s==='heads'?'heads':'tails');
  coin.textContent=s==='heads'?'👑':'🌊';
}

async function playCoinflip() {
  const bet=getBet('cf-bet');
  if (!bet||bet<1){alert('Enter a valid bet.');return;}
  if (bet>balance){alert('Not enough balance.');return;}
  const btn=document.getElementById('cf-btn');
  btn.disabled=true;
  document.getElementById('cf-result').className='result-box';
  const coin=document.getElementById('coin');
  coin.className='coin flipping';
  await sleep(900);
  const result=Math.random()<0.5?'heads':'tails';
  const win=result===cfSide;
  coin.className='coin '+result;
  coin.textContent=result==='heads'?'👑':'🌊';
  if(win){updateBalanceUI(balance+bet);showResult('cf',true,bet,'You got '+result+'!');}
  else{updateBalanceUI(balance-bet);showResult('cf',false,bet,'It was '+result+'.');}
  await saveBalance();
  btn.disabled=false;
}

// MINES
let minesActive=false,minesBoard=[],minesGemsFound=0,minesBet=0,minesCount=0;
function getMinesMulti(gems,mines){if(gems===0)return 1;return Math.max(1,parseFloat((1+gems*mines*0.12).toFixed(2)));}

function buildMinesGrid(locked) {
  const grid=document.getElementById('mines-grid');
  grid.innerHTML='';
  minesBoard.forEach((cell,i)=>{
    const el=document.createElement('div');
    el.className='mine-cell'+(cell.revealed?' revealed '+(cell.isMine?'bomb':'gem'):'');
    el.textContent=cell.revealed?(cell.isMine?'💣':'💎'):'';
    if(!cell.revealed&&!locked)el.onclick=()=>revealCell(i);
    grid.appendChild(el);
  });
}

async function startMines() {
  const bet=getBet('mines-bet');
  if(!bet||bet<1){alert('Enter a valid bet.');return;}
  if(bet>balance){alert('Not enough balance.');return;}
  minesBet=bet;minesCount=parseInt(document.getElementById('mines-count').value);minesGemsFound=0;
  minesBoard=Array(25).fill(null).map(()=>({isMine:false,revealed:false}));
  let placed=0;
  while(placed<minesCount){const i=Math.floor(Math.random()*25);if(!minesBoard[i].isMine){minesBoard[i].isMine=true;placed++;}}
  minesActive=true;
  updateBalanceUI(balance-minesBet);
  document.getElementById('mines-start-btn').disabled=true;
  document.getElementById('mines-cashout').disabled=false;
  document.getElementById('mines-info').style.display='flex';
  document.getElementById('mines-result').className='result-box';
  updateMinesInfo();buildMinesGrid(false);
}

function revealCell(i) {
  if(!minesActive||minesBoard[i].revealed)return;
  minesBoard[i].revealed=true;
  if(minesBoard[i].isMine){
    minesBoard.forEach(c=>c.revealed=true);
    buildMinesGrid(true);minesActive=false;
    document.getElementById('mines-start-btn').disabled=false;
    document.getElementById('mines-cashout').disabled=true;
    document.getElementById('mines-info').style.display='none';
    showResult('mines',false,minesBet,'Boom! Hit a mine.');
    saveBalance();
  } else {
    minesGemsFound++;updateMinesInfo();buildMinesGrid(false);
    if(25-minesCount-minesGemsFound===0)cashoutMines();
  }
}

function updateMinesInfo() {
  const multi=getMinesMulti(minesGemsFound,minesCount);
  const profit=Math.floor(minesBet*multi)-minesBet;
  document.getElementById('mines-multi').textContent=multi.toFixed(2)+'x';
  document.getElementById('mines-profit').textContent='$'+profit;
  document.getElementById('mines-gems').textContent=minesGemsFound;
}

async function cashoutMines() {
  if(!minesActive)return;
  minesActive=false;
  const multi=getMinesMulti(minesGemsFound,minesCount);
  const won=Math.floor(minesBet*multi);
  updateBalanceUI(balance+won);
  document.getElementById('mines-start-btn').disabled=false;
  document.getElementById('mines-cashout').disabled=true;
  document.getElementById('mines-info').style.display='none';
  minesBoard.forEach(c=>c.revealed=true);buildMinesGrid(true);
  showResult('mines',true,won-minesBet,'Cashed out at '+multi.toFixed(2)+'x!');
  await saveBalance();
}

// ROULETTE
const RED_NUMS=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
let rBet=null;

function buildWheel(){
  const svg=document.getElementById('roulette-svg');
  const nums=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
  const total=nums.length,r=90,cx=100,cy=100;
  let html='';
  nums.forEach((n,i)=>{
    const a1=(i/total)*2*Math.PI-Math.PI/2,a2=((i+1)/total)*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const color=n===0?'#16a34a':RED_NUMS.includes(n)?'#dc2626':'#1e293b';
    html+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,0,1,${x2},${y2} Z" fill="${color}" stroke="#0f1923" stroke-width="1"/>`;
    const ma=(a1+a2)/2,tx=cx+(r*0.65)*Math.cos(ma),ty=cy+(r*0.65)*Math.sin(ma);
    html+=`<text x="${tx}" y="${ty}" fill="white" font-size="6" text-anchor="middle" dominant-baseline="middle" font-family="Rajdhani">${n}</text>`;
  });
  html+=`<circle cx="${cx}" cy="${cy}" r="18" fill="#0f1923" stroke="#2a3f52" stroke-width="2"/>`;
  svg.innerHTML=html;
}

function selectRBet(b){
  rBet=b;
  document.querySelectorAll('.roulette-bet-btn').forEach(el=>el.classList.toggle('active',el.dataset.bet===b));
}

async function spinRoulette(){
  if(!rBet){alert('Select a bet type first.');return;}
  const bet=getBet('r-bet');
  if(!bet||bet<1){alert('Enter a valid bet.');return;}
  if(bet>balance){alert('Not enough balance.');return;}
  const btn=document.getElementById('r-btn');
  btn.disabled=true;
  document.getElementById('r-result').className='result-box';
  const numEl=document.getElementById('roulette-number');
  numEl.className='roulette-number';
  const svg=document.getElementById('roulette-svg');
  svg.style.animation='none';svg.offsetHeight;
  svg.style.animation='spin 3s cubic-bezier(.2,.8,.2,1) forwards';
  await sleep(3100);
  const num=Math.floor(Math.random()*37);
  const isRed=RED_NUMS.includes(num);
  const color=num===0?'green':isRed?'red':'black';
  let win=false,multi=0;
  if(rBet==='red'&&isRed){win=true;multi=2;}
  else if(rBet==='black'&&!isRed&&num!==0){win=true;multi=2;}
  else if(rBet==='green'&&num===0){win=true;multi=14;}
  else if(rBet==='odd'&&num>0&&num%2!==0){win=true;multi=2;}
  else if(rBet==='even'&&num>0&&num%2===0){win=true;multi=2;}
  else if(rBet==='1-18'&&num>=1&&num<=18){win=true;multi=2;}
  else if(rBet==='19-36'&&num>=19&&num<=36){win=true;multi=2;}
  numEl.className='roulette-number '+color+' show';
  numEl.textContent=num;
  if(win){const profit=bet*multi-bet;updateBalanceUI(balance-bet+bet*multi);showResult('r',true,profit,'Number '+num+' — '+color+'!');}
  else{updateBalanceUI(balance-bet);showResult('r',false,bet,'Number '+num+' — '+color+'.');}
  await saveBalance();
  btn.disabled=false;
}

buildWheel();
</script>
