<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f14;
  --bg2: #0f141c;
  --bg3: #141a22;
  --surface: #181f2a;
  --surface2: #1e2832;
  --surface3: #24303c;
  --border: #2a3440;
  --border2: #364150;
  --accent: #00d46a;
  --accent2: #00b058;
  --text: #e0e8f0;
  --text2: #8090a0;
  --text3: #506070;
  --red: #e84040;
  --gold: #e8a020;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.auth-container { width: 100%; max-width: 380px; padding: 20px; }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.auth-logo h1 b { color: var(--accent); }
.auth-logo p { color: var(--text2); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

.auth-tabs { display: flex; gap: 6px; background: var(--bg2); border-radius: 8px; padding: 4px; margin-bottom: 20px; }
.auth-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text3); border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
.auth-tab.active { background: var(--surface2); color: var(--text); }

.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; color: var(--text2); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.auth-field input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 0.9rem; outline: none; transition: all 0.2s; }
.auth-field input:focus { border-color: var(--accent); }

.auth-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
.auth-btn:hover:not(:disabled) { background: var(--accent2); }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.auth-msg { text-align: center; margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.8rem; display: none; }
.auth-msg.error { background: rgba(232,64,64,0.15); color: var(--red); display: block; }
.auth-msg.success { background: rgba(0,212,106,0.15); color: var(--accent); display: block; }

.footer { text-align: center; margin-top: 20px; }
.footer a { color: var(--text3); font-size: 0.75rem; text-decoration: none; }
.footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>FRESH<b>FLIP</b></h1>
      <p>FreshSMP Casino</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Register</button>
    </div>
    <div id="login-form">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="Enter username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter password">
      </div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">SIGN IN</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="signup-user" placeholder="Choose username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Min 6 characters">
      </div>
      <div class="auth-field">
        <label>Referral Code (optional)</label>
        <input type="text" id="signup-referral" placeholder="Enter code">
      </div>
      <button class="auth-btn" id="signup-btn" onclick="doSignup()">CREATE ACCOUNT</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>
<script src="js/auth.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  setMsg('', '');
}

function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) { setMsg('Please fill all fields.', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'SIGNING IN...';
  try {
    await Session.login(u, p);
    window.location.href = 'games/coinflip.html';
  } catch(e) { setMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'SIGN IN'; }
}

async function doSignup() {
  const u = document.getElementById('signup-user').value.trim();
  const p = document.getElementById('signup-pass').value;
  const ref = document.getElementById('signup-referral').value.trim().toUpperCase();
  if (!u || !p) { setMsg('Please fill all fields.', 'error'); return; }
  if (u.length < 3) { setMsg('Username min 3 characters.', 'error'); return; }
  if (p.length < 6) { setMsg('Password min 6 characters.', 'error'); return; }
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'CREATING...';
  try {
    await Session.signup(u, p, ref);
    setMsg('Account created!', 'success');
    setTimeout(() => window.location.href = 'games/coinflip.html', 800);
  } catch(e) { setMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'CREATE ACCOUNT'; }
}

Session.init().then(() => { if (Session.isLoggedIn()) window.location.href = 'games/coinflip.html'; });
</script>
</body>
</html>
