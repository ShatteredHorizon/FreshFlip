<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e14;
  --bg2: #0d1117;
  --bg3: #111820;
  --surface: #161f2a;
  --surface2: #1a2633;
  --surface3: #1e2d3d;
  --border: #252f3f;
  --border2: #2d3a4a;
  --accent: #00ff88;
  --accent2: #00cc6a;
  --accent3: #00ffaa;
  --accent-glow: rgba(0,255,136,0.15);
  --accent-glow2: rgba(0,255,136,0.3);
  --text: #e8f0f8;
  --text2: #8a9ab0;
  --text3: #5a6a7a;
  --red: #ff4466;
  --red2: #ff6680;
  --gold: #ffcc00;
  --gold2: #ffd940;
  --blue: #4488ff;
  --purple: #a855f7;
  --gradient: linear-gradient(135deg, #00ff88 0%, #00cc6a 50%, #00ff88 100%);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'Inter', sans-serif; 
  min-height: 100vh; 
  overflow-x:hidden; 
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0,255,136,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.06) 0%, transparent 50%),
    var(--bg);
}

.auth-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  box-shadow: 
    0 0 60px rgba(0,255,136,0.08),
    0 25px 50px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--gradient);
}

.auth-card::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,136,0.03) 0%, transparent 60%);
  pointer-events: none;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  width: 72px;
  height: 72px;
  background: var(--bg3);
  border: 2px solid var(--border);
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.logo-icon::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient);
  opacity: 0.1;
}

.logo-icon span {
  font-size: 2rem;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent);
}

.logo h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo p {
  color: var(--text2);
  font-size: 0.72rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 6px;
}

.auth-tabs {
  display: flex;
  gap: 8px;
  background: var(--bg3);
  border-radius: 14px;
  padding: 6px;
  margin-bottom: 28px;
  border: 1px solid var(--border);
}

.auth-tab {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  color: var(--text3);
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  transition: all 0.25s ease;
}

.auth-tab.active {
  background: var(--surface2);
  color: var(--accent);
  box-shadow: 0 4px 15px rgba(0,255,136,0.15);
}

.auth-tab:hover:not(.active) {
  color: var(--text2);
}

.auth-field {
  margin-bottom: 20px;
}

.auth-field label {
  display: block;
  color: var(--text2);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.auth-field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: all 0.25s ease;
}

.auth-field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.auth-field input::placeholder {
  color: var(--text3);
}

.auth-btn {
  width: 100%;
  padding: 18px;
  background: var(--gradient);
  border: none;
  border-radius: 14px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.auth-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

.auth-btn:hover::before {
  left: 100%;
}

.auth-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,255,136,0.35);
}

.auth-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.auth-btn:active:not(:disabled) {
  transform: translateY(0);
}

.auth-message {
  text-align: center;
  margin-top: 16px;
  padding: 14px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 500;
}

.auth-message.error {
  background: rgba(255,68,102,0.15);
  color: var(--red2);
  border: 1px solid rgba(255,68,102,0.3);
}

.auth-message.success {
  background: var(--accent-glow);
  color: var(--accent3);
  border: 1px solid rgba(0,255,136,0.3);
}

.referral-badge {
  text-align: center;
  margin-top: 20px;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
}

.referral-badge label {
  color: var(--text2);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 6px;
}

.referral-badge input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: var(--gold);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-align: center;
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 24px;
}

.footer-links a {
  color: var(--text3);
  font-size: 0.78rem;
  text-decoration: none;
  transition: color 0.2s ease;
}

.footer-links a:hover {
  color: var(--accent);
}

.features {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.feature {
  text-align: center;
}

.feature-icon {
  font-size: 1.4rem;
  margin-bottom: 4px;
}

.feature-label {
  color: var(--text3);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.loading {
  animation: pulse 1.5s infinite;
}
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon">
        <span>◆</span>
      </div>
      <h1>FRESHFLIP</h1>
      <p>Premium Casino</p>
    </div>
    
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Register</button>
    </div>
    
    <div id="login-form">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="Enter your username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter your password">
      </div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">SIGN IN</button>
    </div>
    
    <div id="signup-form" style="display:none">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="signup-user" placeholder="Choose a username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Min 6 characters">
      </div>
      <div class="auth-field" id="referral-field">
        <label>Referral Code (optional)</label>
        <input type="text" id="signup-referral" placeholder="Enter referral code">
      </div>
      <button class="auth-btn" id="signup-btn" onclick="doSignup()">CREATE ACCOUNT</button>
    </div>
    
    <div class="auth-message" id="auth-message" style="display:none"></div>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎮</div>
        <div class="feature-label">5+ Games</div>
      </div>
      <div class="feature">
        <div class="feature-icon">💎</div>
        <div class="feature-label">Instant</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-label">Fair Play</div>
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  showMsg('', '');
}

function showMsg(msg, type) {
  const el = document.getElementById('auth-message');
  if (!msg) {
    el.style.display = 'none';
    return;
  }
  el.textContent = msg;
  el.className = 'auth-message ' + (type === 'error' ? 'error' : 'success');
  el.style.display = 'block';
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) { showMsg('Please fill all fields.', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'SIGNING IN...';
  try {
    await Session.login(u, p);
    window.location.href = 'games/coinflip.html';
  } catch(e) { showMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'SIGN IN'; }
}

async function doSignup() {
  const u = document.getElementById('signup-user').value.trim();
  const p = document.getElementById('signup-pass').value;
  const ref = document.getElementById('signup-referral').value.trim().toUpperCase();
  if (!u || !p) { showMsg('Please fill all fields.', 'error'); return; }
  if (u.length < 3) { showMsg('Username must be at least 3 characters.', 'error'); return; }
  if (p.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = 'CREATING...';
  try {
    await Session.signup(u, p, ref);
    showMsg('Account created! Signing you in...', 'success');
    setTimeout(() => window.location.href = 'games/coinflip.html', 1000);
  } catch(e) { showMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'CREATE ACCOUNT'; }
}

Session.init().then(() => {
  if (Session.isLoggedIn()) {
    window.location.href = 'games/coinflip.html';
  }
});
</script>
</body>
</html>
