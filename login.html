<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg: #0c0f12; --surface: #1a1f26; --bg2: #101418; --border: #343d4a; --accent: #00b060; --accent2: #009050; --text: #d0d8e0; --text2: #8898a8; --text3: #586878; --red: #d83848; --gold: #c89020; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

.auth-container { width: 100%; max-width: 320px; padding: 20px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
.auth-logo { text-align: center; margin-bottom: 20px; }
.auth-logo h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; color: var(--text); }
.auth-logo h1 b { color: var(--accent); }
.auth-logo p { color: var(--text2); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

.auth-tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: 5px; padding: 3px; margin-bottom: 16px; }
.auth-tab { flex: 1; padding: 6px; border: none; background: transparent; color: var(--text3); border-radius: 3px; cursor: pointer; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; }
.auth-tab.active { background: var(--surface); color: var(--text); }

.auth-field { margin-bottom: 10px; }
.auth-field label { display: block; color: var(--text2); font-size: 0.6rem; font-weight: 500; text-transform: uppercase; margin-bottom: 4px; }
.auth-field input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; color: var(--text); font-size: 0.8rem; outline: none; }
.auth-field input:focus { border-color: var(--accent); }

.auth-btn { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 5px; color: #000; font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
.auth-btn:hover:not(:disabled) { background: var(--accent2); }
.auth-btn:disabled { opacity: 0.5; }

.auth-msg { text-align: center; margin-top: 8px; padding: 6px; border-radius: 3px; font-size: 0.7rem; display: none; }
.auth-msg.error { background: rgba(216,56,72,0.15); color: var(--red); display: block; }
.auth-msg.success { background: rgba(0,176,96,0.15); color: var(--accent); display: block; }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo"><h1>FRESH<b>FLIP</b></h1><p>FreshSMP Casino</p></div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Register</button>
    </div>
    <div id="login-form">
      <div class="auth-field"><label>Username</label><input type="text" id="login-user" placeholder="Enter username"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">SIGN IN</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="auth-field"><label>Username</label><input type="text" id="signup-user" placeholder="Choose username"></div>
      <div class="auth-field"><label>Email</label><input type="email" id="signup-email" placeholder="your@email.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="signup-pass" placeholder="Min 6 characters"></div>
      <div class="auth-field"><label>Referral Code (optional)</label><input type="text" id="signup-referral" placeholder="Enter code"></div>
      <button class="auth-btn" id="signup-btn" onclick="doSignup()">CREATE ACCOUNT</button>
    </div>
    <div id="verify-form" style="display:none">
      <div class="auth-field"><label>Verification Code</label><input type="text" id="verify-code" placeholder="Enter 6-digit code"></div>
      <button class="auth-btn" id="verify-btn" onclick="doVerify()">VERIFY EMAIL</button>
      <button class="auth-btn" style="background:var(--surface);margin-top:6px" id="resend-btn" onclick="resendCode()">RESEND CODE</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>
<script src="js/auth.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const refParam = urlParams.get('ref');

if (refParam) {
  document.getElementById('signup-referral').value = refParam.toUpperCase();
  switchTab('signup');
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('verify-form').style.display = tab === 'verify' ? 'block' : 'none';
  setMsg('', '');
}

function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) { setMsg('Fill all fields.', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'SIGNING IN...';
  try { await Session.login(u, p); window.location.href = 'games/coinflip.html'; }
  catch(e) { setMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'SIGN IN'; }
}

async function doSignup() {
  const u = document.getElementById('signup-user').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const p = document.getElementById('signup-pass').value;
  const ref = document.getElementById('signup-referral').value.trim().toUpperCase();
  if (!u || !p || !email) { setMsg('Fill all fields.', 'error'); return; }
  if (u.length < 3) { setMsg('Username min 3 chars.', 'error'); return; }
  if (p.length < 6) { setMsg('Password min 6 chars.', 'error'); return; }
  if (!email.includes('@')) { setMsg('Valid email required.', 'error'); return; }
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'CREATING...';
  setMsg('', '');
  try {
    pendingEmail = email;
    const hash = await hashPassword(p);
    let referrerId = null, newBalance = 1000;
    if (ref) {
      const { data: refData } = await sb.from('users').select('id').eq('referral_code', ref).maybeSingle();
      if (refData) { referrerId = refData.id; newBalance = 11000; }
    }
    const { data, error } = await sb.from('users').insert({ 
      username: u, password: hash, email: email, balance: newBalance, referred_by: referrerId 
    }).select().maybeSingle();
    if (error) { if (error.code === '23505') throw new Error('Username already taken.'); throw new Error('Error: ' + error.message); }
    window.pendingUserId = data.id;
    await sendVerificationEmail(email, data.id);
    switchTab('verify');
    setMsg('Code sent to ' + email, 'success');
  } catch(e) { 
    console.error(e);
    setMsg(e.message || 'Error: ' + e, 'error'); 
  }
  finally { btn.disabled = false; btn.textContent = 'CREATE ACCOUNT'; }
}

let pendingEmail = '', pendingUserId = '';

async function doVerify() {
  const code = document.getElementById('verify-code').value.trim();
  if (!code || code.length !== 6) { setMsg('Enter 6-digit code.', 'error'); return; }
  const btn = document.getElementById('verify-btn');
  btn.disabled = true; btn.textContent = 'VERIFYING...';
  try {
    await verifyEmailCode(window.pendingUserId, code);
    setMsg('Email verified! Signing in...', 'success');
    setTimeout(() => window.location.href = 'games/coinflip.html', 1000);
  } catch(e) { setMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'VERIFY EMAIL'; }
}

async function resendCode() {
  if (!pendingEmail || !window.pendingUserId) return;
  try {
    await sendVerificationEmail(pendingEmail, window.pendingUserId);
    setMsg('Code resent!', 'success');
  } catch(e) { setMsg(e.message, 'error'); }
}

Session.init().then(() => { if (Session.isLoggedIn()) window.location.href = 'games/coinflip.html'; });
</script>
</body>
</html>
