<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #1a1a23;
  --bg3: #222230;
  --accent: #00ff88;
  --text: #fff;
  --text2: #888;
  --border: #2a2a35;
  --blue: #3742fa;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-container {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 30px;
}

.logo {
  text-align: center;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.logo span { color: var(--accent); }

.tagline {
  text-align: center;
  color: var(--text2);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.discord-btn {
  width: 100%;
  padding: 14px;
  background: var(--blue);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 20px;
}

.discord-btn:hover {
  background: #2a35fa;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.divider span {
  color: var(--text2);
  font-size: 0.75rem;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  color: var(--text2);
  font-size: 0.75rem;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
}

.field input:focus {
  border-color: var(--accent);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #000;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

.login-btn:hover {
  background: #00dd77;
}

.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.msg {
  text-align: center;
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.85rem;
  display: none;
}

.msg.error {
  background: rgba(255, 71, 87, 0.1);
  color: #ff4757;
  display: block;
}

.msg.success {
  background: rgba(0, 255, 136, 0.1);
  color: var(--accent);
  display: block;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">FRESH<span>FLIP</span></div>
    <p class="tagline">Sign in to play</p>
    
    <button class="discord-btn" onclick="doDiscord()">CONTINUE WITH DISCORD</button>
    
    <div class="divider"><span>or</span></div>
    
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Your username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
    </div>
    
    <button class="login-btn" onclick="doLogin()">SIGN IN</button>
    
    <div class="msg" id="msg"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
function showMsg(text, type) {
  const msg = document.getElementById('msg');
  if (!text) { msg.style.display = 'none'; return; }
  msg.textContent = text;
  msg.className = 'msg ' + type;
}

async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  if (!u || !p) { showMsg('Fill all fields', 'error'); return; }
  
  const btn = document.querySelector('.login-btn');
  btn.disabled = true;
  btn.textContent = 'SIGNING IN...';
  
  try {
    await Session.login(u, p);
    location.href = 'index.html';
  } catch(e) {
    showMsg(e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'SIGN IN';
  }
}

async function doDiscord() {
  const { data, error } = await sb.auth.signInWithOAuth({
    provider: 'discord',
    options: { redirectTo: 'https://freshflip.vercel.app/login.html' }
  });
  if (error) showMsg(error.message, 'error');
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    handleDiscord(session);
  }
});

async function handleDiscord(session) {
  const email = session.user.email;
  window.pendingDiscordSession = session;
  
  let { data: existing } = await sb.from('users').select('*').eq('email', email).maybeSingle();
  
  if (existing) {
    await loginDiscord(existing);
  } else {
    showDiscordSignup(email);
  }
}

function showDiscordSignup(email) {
  document.querySelector('.login-card').innerHTML = `
    <div class="logo">FRESH<span>FLIP</span></div>
    <p class="tagline" style="color:var(--accent)">New Discord Account</p>
    <p class="tagline">${email}</p>
    <div class="field">
      <label>Choose Username</label>
      <input type="text" id="new-username" placeholder="Username">
    </div>
    <div class="field">
      <label>Create Password</label>
      <input type="password" id="new-password" placeholder="Min 6 characters">
    </div>
    <div class="field">
      <label>Referral Code (optional)</label>
      <input type="text" id="referral" placeholder="Enter code">
    </div>
    <button class="login-btn" onclick="finishDiscordSignup('${email}')">CREATE ACCOUNT</button>
  `;
}

async function finishDiscordSignup(email) {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const referral = document.getElementById('referral').value.trim().toUpperCase();
  
  if (!username || username.length < 3) { showMsg('Username min 3 chars', 'error'); return; }
  if (!password || password.length < 6) { showMsg('Password min 6 chars', 'error'); return; }
  
  let referrerId = null, balance = 1000;
  if (referral) {
    const { data } = await sb.from('users').select('id').eq('referral_code', referral).maybeSingle();
    if (data) { referrerId = data.id; balance = 11000; }
  }
  
  const hash = await hashPassword(password);
  const session = window.pendingDiscordSession;
  
  const { error } = await sb.from('users').insert({
    username,
    email,
    discord_id: session.user.id,
    password: hash,
    balance,
    referred_by: referrerId
  });
  
  if (error) {
    showMsg(error.code === '23505' ? 'Username taken' : error.message, 'error');
    return;
  }
  
  const { data: user } = await sb.from('users').select('*').eq('email', email).maybeSingle();
  await loginDiscord(user);
}

async function loginDiscord(user) {
  await loadSettings();
  localStorage.setItem('ff_session', JSON.stringify({
    user,
    balance: user.balance,
    winChance: window.WIN_CHANCE
  }));
  window.currentUser = user;
  window.balance = user.balance;
  location.href = 'index.html';
}

Session.init().then(() => {
  if (Session.isLoggedIn()) location.href = 'index.html';
});
</script>
</body>
</html>
