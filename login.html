<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-tertiary: #1a2332;
  --bg-card: #162032;
  --accent-primary: #00ff88;
  --accent-secondary: #00cc6a;
  --accent-glow: rgba(0, 255, 136, 0.4);
  --text-primary: #ffffff;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --red-bright: #ff3366;
  --border-glow: rgba(0, 255, 136, 0.3);
  --blue-bright: #5865F2;
  --gradient-primary: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
  --gradient-discord: linear-gradient(135deg, #5865F2 0%, #424549 100%);
  --shadow-glow: 0 0 30px rgba(0, 255, 136, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: 
    radial-gradient(ellipse at 30% 30%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(88, 101, 242, 0.08) 0%, transparent 50%);
  pointer-events: none;
}

.auth-container { width: 100%; max-width: 400px; padding: 20px; position: relative; z-index: 1; }

.auth-card {
  background: rgba(22, 32, 50, 0.95);
  border: 1px solid var(--border-glow);
  border-radius: 20px;
  padding: 32px;
  box-shadow: var(--shadow-glow), 0 20px 60px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(20px);
}

.auth-logo {
  text-align: center;
  margin-bottom: 8px;
}

.auth-logo h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.auth-logo p {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

.auth-subtitle {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.auth-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 12px;
}

.discord-btn {
  background: var(--gradient-discord);
  color: #fff;
  box-shadow: 0 4px 20px rgba(88, 101, 242, 0.3);
}

.discord-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(88, 101, 242, 0.4);
}

.discord-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255, 255, 255, 0.1);
}

.divider span {
  color: var(--text-muted);
  font-size: 0.7rem;
  text-transform: uppercase;
}

.auth-field { margin-bottom: 12px; }

.auth-field label {
  display: block;
  color: var(--text-secondary);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.auth-field input {
  width: 100%;
  background: var(--bg-secondary);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text-primary);
  font-size: 0.95rem;
  outline: none;
  transition: all 0.3s;
}

.auth-field input:focus {
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-glow);
}

.auth-field input::placeholder {
  color: var(--text-muted);
}

.login-btn {
  background: var(--gradient-primary);
  color: #000;
  box-shadow: var(--shadow-glow);
}

.login-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.auth-msg {
  text-align: center;
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.8rem;
  display: none;
}

.auth-msg.error {
  background: rgba(255, 51, 102, 0.1);
  border: 1px solid rgba(255, 51, 102, 0.3);
  color: var(--red-bright);
  display: block;
}

.auth-msg.success {
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid rgba(0, 255, 136, 0.3);
  color: var(--accent-primary);
  display: block;
}
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>FRESHFLIP</h1>
      <p>Premium Casino</p>
    </div>
    <p class="auth-subtitle">Sign in to play</p>
    
    <button class="auth-btn discord-btn" id="discord-btn" onclick="doDiscordLogin()">CONTINUE WITH DISCORD</button>
    
    <div class="divider"><span>or</span></div>
    
    <div class="auth-field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Your username">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Your password">
    </div>
    <button class="auth-btn login-btn" id="login-btn" onclick="doLogin()">SIGN IN</button>
    
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) { setMsg('Fill all fields.', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'SIGNING IN...';
  try { await Session.login(u, p); window.location.href = 'index.html'; }
  catch(e) { setMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'SIGN IN'; }
}

async function doDiscordLogin() {
  const btn = document.getElementById('discord-btn');
  btn.disabled = true;
  const { data, error } = await sb.auth.signInWithOAuth({ 
    provider: 'discord',
    options: { redirectTo: 'https://freshflip.vercel.app/login.html' }
  });
  if (error) { setMsg(error.message, 'error'); btn.disabled = false; }
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    handleDiscordUser(session);
  }
});

async function handleDiscordUser(session) {
  const email = session.user.email;
  window.pendingDiscordSession = session;
  
  let { data: existing } = await sb.from('users').select('*').eq('email', email).maybeSingle();
  
  if (existing) {
    await loginWithDiscord(existing);
  } else {
    showDiscordUsernameModal(email);
  }
}

function showDiscordUsernameModal(email) {
  document.querySelector('.auth-card').innerHTML = `
    <div class="auth-logo"><h1>FRESHFLIP</h1><p>Premium Casino</p></div>
    <p class="auth-subtitle" style="color:var(--accent-primary);">New Discord Account</p>
    <p class="auth-subtitle">${email}</p>
    <div class="auth-field">
      <label>Choose Username</label>
      <input type="text" id="discord-username" placeholder="Username">
    </div>
    <div class="auth-field">
      <label>Create Password</label>
      <input type="password" id="discord-pass" placeholder="Min 6 characters">
    </div>
    <div class="auth-field">
      <label>Referral Code (optional)</label>
      <input type="text" id="signup-referral" placeholder="Enter code">
    </div>
    <button class="auth-btn login-btn" id="discord-finish-btn">CREATE ACCOUNT</button>
  `;
  document.getElementById('discord-finish-btn').onclick = () => finishDiscordSignup(email);
}

async function finishDiscordSignup(email) {
  const username = document.getElementById('discord-username').value.trim();
  const password = document.getElementById('discord-pass').value;
  const ref = document.getElementById('signup-referral').value.trim().toUpperCase();
  
  if (!username || username.length < 3) { setMsg('Username min 3 chars.', 'error'); return; }
  if (!password || password.length < 6) { setMsg('Password min 6 chars.', 'error'); return; }
  
  let referrerId = null, newBalance = 1000;
  if (ref) {
    const { data: refData } = await sb.from('users').select('id').eq('referral_code', ref).maybeSingle();
    if (refData) { referrerId = refData.id; newBalance = 11000; }
  }
  
  const session = window.pendingDiscordSession;
  if (!session) { setMsg('Session expired. Try again.', 'error'); return; }
  
  const hash = await hashPassword(password);
  const { error } = await sb.from('users').insert({
    username: username,
    email: email,
    discord_id: session.user.id,
    password: hash,
    balance: newBalance,
    referred_by: referrerId
  });
  
  if (error) {
    if (error.code === '23505') setMsg('Username taken.', 'error');
    else setMsg(error.message, 'error');
    return;
  }
  
  const { data: user } = await sb.from('users').select('*').eq('email', email).maybeSingle();
  await loginWithDiscord(user);
}

async function loginWithDiscord(user) {
  await loadSettings();
  const sessionData = { user: user, balance: user.balance, winChance: window.WIN_CHANCE };
  localStorage.setItem('ff_session', JSON.stringify(sessionData));
  window.currentUser = user;
  window.balance = user.balance;
  window.location.href = 'index.html';
}

Session.init().then(() => { if (Session.isLoggedIn()) window.location.href = 'index.html'; });
</script>
</body>
</html>
