<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip Casino</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg: #0c0f12; --surface: #1a1f26; --bg2: #101418; --border: #343d4a; --accent: #00b060; --accent2: #009050; --text: #d0d8e0; --text2: #8898a8; --text3: #586878; --red: #d83848; --gold: #c89020; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

.auth-container { width: 100%; max-width: 360px; padding: 20px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
.auth-logo { text-align: center; margin-bottom: 24px; }
.auth-logo h1 { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: 3px; color: var(--text); }
.auth-logo h1 b { color: var(--accent); }
.auth-logo p { color: var(--text2); font-size: 0.55rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
.auth-tagline { text-align: center; color: var(--text2); font-size: 0.8rem; margin-bottom: 20px; }

.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; color: var(--text2); font-size: 0.6rem; font-weight: 500; text-transform: uppercase; margin-bottom: 6px; }
.auth-field input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 0.9rem; outline: none; }
.auth-field input:focus { border-color: var(--accent); }

.auth-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.auth-btn:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
.auth-btn:disabled { opacity: 0.5; }

.auth-btn.discord { background: #5865F2; color: #fff; margin-bottom: 12px; }
.auth-btn.discord:hover:not(:disabled) { background: #4752C8; }
.auth-btn.secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
.auth-btn.secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }

.divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { color: var(--text3); font-size: 0.65rem; text-transform: uppercase; }

.auth-msg { text-align: center; margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.75rem; display: none; }
.auth-msg.error { background: rgba(216,56,72,0.15); color: var(--red); display: block; }
.auth-msg.success { background: rgba(0,176,96,0.15); color: var(--accent); display: block; }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo"><h1>FRESH<b>FLIP</b></h1><p>Premium Casino</p></div>
    <p class="auth-tagline">Sign in with Discord to play</p>
    
    <button class="auth-btn discord" onclick="doDiscordLogin()">CONTINUE WITH DISCORD</button>
    
    <div class="divider"><span>or</span></div>
    
    <div class="auth-field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Your username">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Your password">
    </div>
    <button class="auth-btn secondary" onclick="doLogin()">SIGN IN</button>
    
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>
<script src="js/auth.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const refParam = urlParams.get('ref');

function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (!u || !p) { setMsg('Fill all fields.', 'error'); return; }
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'SIGNING IN...';
  try { await Session.login(u, p); window.location.href = 'index.html'; }
  catch(e) { setMsg(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'SIGN IN'; }
}

async function doDiscordLogin() {
  const { data, error } = await sb.auth.signInWithOAuth({ 
    provider: 'discord',
    options: { redirectTo: 'https://freshflip.vercel.app/login.html' }
  });
  if (error) { setMsg(error.message, 'error'); }
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    handleDiscordUser(session);
  }
});

async function handleDiscordUser(session) {
  const email = session.user.email;
  window.pendingDiscordSession = session;
  
  let { data: existing } = await sb.from('users').select('*').eq('email', email).maybeSingle();
  
  if (existing) {
    await loginWithDiscord(existing);
  } else {
    showDiscordUsernameModal(email);
  }
}

function showDiscordUsernameModal(email) {
  document.querySelector('.auth-card').innerHTML = `
    <div class="auth-logo"><h1>FRESH<b>FLIP</b></h1><p>Premium Casino</p></div>
    <p class="auth-tagline" style="color:var(--accent);">New Discord Account</p>
    <p class="auth-tagline">${email}</p>
    <div class="auth-field">
      <label>Choose Username</label>
      <input type="text" id="discord-username" placeholder="Username">
    </div>
    <div class="auth-field">
      <label>Create Password</label>
      <input type="password" id="discord-pass" placeholder="Min 6 characters">
    </div>
    <div class="auth-field">
      <label>Referral Code (optional)</label>
      <input type="text" id="signup-referral" placeholder="Enter code">
    </div>
    <button class="auth-btn" id="discord-finish-btn">CREATE ACCOUNT</button>
  `;
  document.getElementById('discord-finish-btn').onclick = () => finishDiscordSignup(email);
}

async function finishDiscordSignup(email) {
  const username = document.getElementById('discord-username').value.trim();
  const password = document.getElementById('discord-pass').value;
  const ref = document.getElementById('signup-referral').value.trim().toUpperCase();
  
  if (!username || username.length < 3) { setMsg('Username min 3 chars.', 'error'); return; }
  if (!password || password.length < 6) { setMsg('Password min 6 chars.', 'error'); return; }
  
  let referrerId = null, newBalance = 1000;
  if (ref) {
    const { data: refData } = await sb.from('users').select('id').eq('referral_code', ref).maybeSingle();
    if (refData) { referrerId = refData.id; newBalance = 11000; }
  }
  
  const session = window.pendingDiscordSession;
  if (!session) { setMsg('Session expired. Try again.', 'error'); return; }
  
  const hash = await hashPassword(password);
  const { error } = await sb.from('users').insert({
    username: username,
    email: email,
    discord_id: session.user.id,
    password: hash,
    balance: newBalance,
    referred_by: referrerId
  });
  
  if (error) {
    if (error.code === '23505') setMsg('Username taken.', 'error');
    else setMsg(error.message, 'error');
    return;
  }
  
  const { data: user } = await sb.from('users').select('*').eq('email', email).maybeSingle();
  await loginWithDiscord(user);
}

async function loginWithDiscord(user) {
  await loadSettings();
  const sessionData = { user: user, balance: user.balance, winChance: window.WIN_CHANCE };
  localStorage.setItem('ff_session', JSON.stringify(sessionData));
  window.currentUser = user;
  window.balance = user.balance;
  window.location.href = 'index.html';
}

Session.init().then(() => { if (Session.isLoggedIn()) window.location.href = 'index.html'; });
</script>
</body>
</html>
