<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Dragon Tower</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0f12;--surface:#1a1f26;--bg2:#101418;--surface2:#222a34;--border:#343d4a;--accent:#00b060;--accent2:#009050;--text:#d0d8e0;--text2:#8898a8;--text3:#586878;--red:#d83848;--gold:#c89020;--purple:#9060d8}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}#app{display:none;flex-direction:column;min-height:100vh}nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}.logo{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:2px;cursor:pointer}.logo b{color:var(--accent)}.nav-balance{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 12px}.nav-balance span{color:var(--text2);font-size:0.65rem;font-weight:500;text-transform:uppercase}.nav-balance strong{color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700}.nav-right{display:flex;align-items:center;gap:12px}.nav-user{color:var(--text2);font-size:0.78rem}.logout-btn{background:0 0;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.7rem}.logout-btn:hover{border-color:var(--red);color:var(--red)}.layout{display:flex;flex:1}aside{width:180px;background:var(--surface);border-right:1px solid var(--border);padding:8px 0;flex-shrink:0}.sidebar-section{color:#586878;font-size:0.55rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:5px;margin-top:8px}.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;color:var(--text2);font-size:0.8rem;font-weight:500;transition:all .2s}.sidebar-item:hover{color:var(--text);background:var(--surface2)}.sidebar-item.active{color:var(--accent);background:rgba(0,176,96,0.1)}.sidebar-item .icon{width:22px;height:22px;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700}main{flex:1;padding:16px;overflow-y:auto;background:var(--bg2)}.game-container{max-width:480px;margin:0 auto}.page-header{margin-bottom:16px}.page-header h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700}.page-header p{color:var(--text2);font-size:0.75rem}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}.card-title{font-size:0.6rem;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}.bet-label{color:var(--text2);font-size:0.65rem;font-weight:500;text-transform:uppercase;margin-bottom:5px;display:block}.bet-input-wrap{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:5px;margin-bottom:6px}.bet-input-wrap:focus-within{border-color:var(--accent)}.bet-currency{color:var(--text2);padding:0 8px;font-size:0.8rem;font-weight:600}.bet-input{flex:1;background:0 0;border:none;padding:8px 0;color:var(--text);font-size:0.85rem;outline:0}.bet-quick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}.bet-quick button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:0.65rem;font-weight:500}.bet-quick button:hover{border-color:var(--accent);color:var(--accent)}.play-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:5px;color:#000;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}.play-btn:hover:not(:disabled){background:var(--accent2)}.play-btn:disabled{opacity:.4;cursor:not-allowed}.result-box{margin-top:10px;padding:12px;border-radius:5px;text-align:center;display:none}.result-box.win{background:rgba(0,176,96,0.1);border:1px solid rgba(0,176,96,0.3);display:block}.result-box.lose{background:rgba(216,56,72,0.1);border:1px solid rgba(216,56,72,0.3);display:block}.result-amount{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700}.result-box.win .result-amount{color:var(--accent)}.result-box.lose .result-amount{color:var(--red)}.result-msg{color:var(--text2);font-size:0.7rem;margin-top:3px}.floor{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;margin:4px 0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:600}.floor.current{background:rgba(0,176,96,0.15);border-color:var(--accent)}.floor.safe{background:rgba(0,176,96,0.2)}.floor.danger{background:rgba(216,56,72,0.2)}.floor .num{color:var(--text2);margin-right:8px}.floor .reward{color:var(--accent)}.floors{display:flex;flex-direction:column-reverse;max-height:280px;overflow-y:auto}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}.stat{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:8px;text-align:center}.stat label{color:var(--text2);font-size:0.55rem;text-transform:uppercase;display:block}.stat strong{font-family:'Rajdhani',sans-serif;font-size:1rem;color:var(--accent)}.floor-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:8px;color:var(--text);font-size:0.85rem;margin-bottom:10px}.select-labels{color:var(--text2);font-size:0.65rem;margin-bottom:6px}.select-labels span:first-child{float:left}.select-labels span:last-child{float:right}.select-labels:after{content:'';clear:both;display:table}.cashout-btn{width:100%;margin-top:6px;padding:8px;background:var(--gold);border:none;border-radius:5px;color:#000;font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}.cashout-btn:disabled{opacity:.3;cursor:not-allowed}@media(max-width:500px){aside{display:none}main{padding:12px}}
</style>
</head>
<body>
<div id="app">
<nav>
<div class="logo" onclick="location.href='../index.html'">FRESH<b>FLIP</b></div>
<div class="nav-balance"><span>Balance</span><strong id="nav-balance">$0</strong></div>
<div class="nav-right"><span class="nav-user" id="nav-user"></span><button class="logout-btn" onclick="Session.logout()">Sign Out</button></div>
</nav>
<div class="layout">
<aside>
<div class="sidebar-section">Games</div>
<div class="sidebar-item" onclick="location.href='coinflip.html'"><span class="icon">C</span>Coin Flip</div>
<div class="sidebar-item" onclick="location.href='mines.html'"><span class="icon">M</span>Mines</div>
<div class="sidebar-item" onclick="location.href='wheel.html'"><span class="icon">W</span>Wheel</div>
<div class="sidebar-item" onclick="location.href='dice.html'"><span class="icon">D</span>Dice</div>
<div class="sidebar-item active"><span class="icon">T</span>Dragon Tower</div>
<div class="sidebar-item" onclick="location.href='chicken.html'"><span class="icon">K</span>Chicken Cross</div>
<div class="sidebar-section">Account</div>
<div class="sidebar-item" onclick="location.href='referral.html'"><span class="icon">+</span>Referral</div>
</aside>
<main>
<div class="game-container">
<div class="page-header"><h2>Dragon Tower</h2><p>Climb the floors, collect treasure</p></div>
<div class="card">
<span class="bet-label">Bet Amount</span>
<div class="bet-input-wrap"><span class="bet-currency">$</span><input class="bet-input" id="tower-bet" type="number" placeholder="0"></div>
<div class="bet-quick"><button onclick="setBet('tower-bet',10)">$10</button><button onclick="setBet('tower-bet',50)">$50</button><button onclick="setBet('tower-bet',100)">$100</button><button onclick="halfBet('tower-bet')">1/2</button><button onclick="doubleBet('tower-bet')">2x</button></div>
<button class="play-btn" id="tower-btn" onclick="startTower()">CLAIM FLOOR</button>
</div>
<div class="card" id="tower-game" style="display:none">
<div class="stats"><div class="stat"><label>Floor</label><strong id="tower-floor">0</strong></div><div class="stat"><label>Multiplier</label><strong id="tower-multi">1.00x</strong></div><div class="stat"><label>Profit</label><strong id="tower-profit">$0</strong></div></div>
<div class="floors" id="floors"></div>
<button class="cashout-btn" id="tower-cashout" onclick="cashOutTower()">CASH OUT</button>
</div>
<div class="result-box" id="tower-result"><div class="result-amount" id="tower-result-amount"></div><div class="result-msg" id="tower-result-msg"></div></div>
</div>
</main>
</div>
</div>
<script src="../js/auth.js"></script>
<script>
let towerActive=false,towerBet=0,towerFloor=0;
const floorRewards=[1,1.5,2,3,5,8,12,20,35,50,75,100,150,250,400];
async function init(){await Session.init();if(!Session.isLoggedIn()){location.href='../login.html';return}document.getElementById('app').style.display='flex';document.getElementById('nav-user').textContent=window.currentUser.username;updateBalanceUI(window.balance);}
function getMulti(floor){return floorRewards[Math.min(floor,floorRewards.length-1)];}
function startTower(){const bet=getBet('tower-bet');if(!bet||bet<1){alert('Enter a valid bet.');return}if(bet>window.balance){alert('Insufficient balance.');return}towerBet=bet;towerFloor=0;towerActive=true;updateBalanceUI(window.balance-bet);document.getElementById('tower-btn').disabled=true;document.getElementById('tower-game').style.display='block';document.getElementById('tower-cashout').disabled=false;updateTowerInfo();buildFloors();}
function buildFloors(){const f=document.getElementById('floors');f.innerHTML='';for(let i=14;i>=0;i--){const fl=document.createElement('div');fl.className='floor'+(i===towerFloor?' current':i<towerFloor?' safe':'');fl.innerHTML='<span class="num">Floor '+(i+1)+'</span><span class="reward">'+floorRewards[i].toFixed(1)+'x</span>';f.appendChild(fl);}}
function updateTowerInfo(){document.getElementById('tower-floor').textContent=towerFloor;const mult=getMulti(towerFloor);document.getElementById('tower-multi').textContent=mult.toFixed(2)+'x';document.getElementById('tower-profit').textContent='$'+Math.floor(towerBet*mult-towerBet);}
async function claimFloor(){if(!towerActive)return;const mult=getMulti(towerFloor);const won=Math.floor(towerBet*mult);towerFloor++;updateBalanceUI(won);updateTowerInfo();buildFloors();if(towerFloor>=14||!biasedWin()){towerActive=false;const totalWon=towerFloor>0?Math.floor(towerBet*getMulti(towerFloor-1))-towerBet:towerBet;updateBalanceUI(window.balance+totalWon);document.getElementById('tower-btn').disabled=false;document.getElementById('tower-cashout').disabled=true;showResult('tower',true,totalWon,'Reached floor '+(towerFloor+1)+'!');await Session.saveBalance();return;}setTimeout(claimFloor,600);}
function startTower(){const bet=getBet('tower-bet');if(!bet||bet<1){alert('Enter a valid bet.');return}if(bet>window.balance){alert('Insufficient balance.');return}towerBet=bet;towerFloor=0;towerActive=true;updateBalanceUI(window.balance-bet);document.getElementById('tower-btn').disabled=true;document.getElementById('tower-game').style.display='block';document.getElementById('tower-cashout').disabled=false;updateTowerInfo();buildFloors();setTimeout(claimFloor,600);}
function cashOutTower(){if(!towerActive)return;towerActive=false;const mult=getMulti(towerFloor);const won=Math.floor(towerBet*mult);updateBalanceUI(window.balance+won);document.getElementById('tower-btn').disabled=false;document.getElementById('tower-cashout').disabled=true;showResult('tower',true,won-towerBet,'Cashed out at floor '+(towerFloor+1)+'!');Session.saveBalance();}
init();
</script>
</body>
</html>
