<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Roulette</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0f12;--bg2:#101418;--surface:#1a1f26;--surface2:#222a34;--surface3:#2a3340;--border:#343d4a;--accent:#00b060;--accent2:#009050;--text:#d0d8e0;--text2:#8898a8;--red:#d83848;--gold:#c89020}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}#app{display:none;flex-direction:column;min-height:100vh}nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}.nav-logo{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:2px;cursor:pointer}.nav-logo b{color:var(--accent)}.nav-balance{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 12px}.nav-balance span{color:var(--text2);font-size:0.65rem;font-weight:500;text-transform:uppercase}.nav-balance strong{color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700}.nav-right{display:flex;align-items:center;gap:12px}.nav-user{color:var(--text2);font-size:0.78rem}.logout-btn{background:0 0;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.7rem}.logout-btn:hover{border-color:var(--red);color:var(--red)}.layout{display:flex;flex:1}aside{width:180px;background:var(--surface);border-right:1px solid var(--border);padding:8px 0;flex-shrink:0}.sidebar-section{color:#586878;font-size:0.55rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:5px;margin-top:8px}.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;color:var(--text2);font-size:0.8rem;font-weight:500;transition:all .2s}.sidebar-item:hover{color:var(--text);background:var(--surface2)}.sidebar-item.active{color:var(--accent);background:rgba(0,176,96,0.1)}.sidebar-item .icon{width:22px;height:22px;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700}main{flex:1;padding:16px;overflow-y:auto;background:var(--bg2)}.game-container{max-width:480px;margin:0 auto}.page-header{margin-bottom:16px}.page-header h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700}.page-header p{color:var(--text2);font-size:0.75rem}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}.card-title{font-size:0.6rem;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}.bet-label{color:var(--text2);font-size:0.65rem;font-weight:500;text-transform:uppercase;margin-bottom:5px;display:block}.bet-input-wrap{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:5px;margin-bottom:6px}.bet-input-wrap:focus-within{border-color:var(--accent)}.bet-currency{color:var(--text2);padding:0 8px;font-size:0.8rem;font-weight:600}.bet-input{flex:1;background:0 0;border:none;padding:8px 0;color:var(--text);font-size:0.85rem;outline:0}.bet-quick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}.bet-quick button{background:var(--surface3);border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:0.65rem;font-weight:500}.bet-quick button:hover{border-color:var(--accent);color:var(--accent)}.play-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:5px;color:#000;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}.play-btn:hover:not(:disabled){background:var(--accent2)}.play-btn:disabled{opacity:.4;cursor:not-allowed}.result-box{margin-top:10px;padding:12px;border-radius:5px;text-align:center;display:none}.result-box.win{background:rgba(0,176,96,0.1);border:1px solid rgba(0,176,96,0.3);display:block}.result-box.lose{background:rgba(216,56,72,0.1);border:1px solid rgba(216,56,72,0.3);display:block}.result-amount{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700}.result-box.win .result-amount{color:var(--accent)}.result-box.lose .result-amount{color:var(--red)}.result-msg{color:var(--text2);font-size:0.7rem;margin-top:3px}.roulette-track{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;overflow:hidden;position:relative}.roulette-strip{display:flex;gap:4px;position:relative;left:0}.roulette-item{flex-shrink:0;width:50px;height:55px;background:var(--surface2);border:2px solid var(--border);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center}.roulette-item.common{border-color:#8090a0}.roulette-item.uncommon{border-color:#3870c8}.roulette-item.rare{border-color:#9060d8}.roulette-item.epic{border-color:#c89020}.roulette-item.legendary{border-color:#d83848}.roulette-item .name{font-size:0.5rem;font-weight:600;margin-top:2px}.roulette-item.common .name{color:#8090a0}.roulette-item.uncommon .name{color:#3870c8}.roulette-item.rare .name{color:#9060d8}.roulette-item.epic .name{color:#c89020}.roulette-item.legendary .name{color:#d83848}.roulette-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:60px;background:var(--accent);border-radius:2px;z-index:10}.case-select{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}.case-option{padding:8px;background:var(--surface3);border:1px solid var(--border);border-radius:5px;cursor:pointer;text-align:center;transition:all .2s}.case-option:hover{border-color:var(--accent)}.case-option.active{border-color:var(--accent);background:rgba(0,176,96,0.1)}.case-option .name{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:600}.case-option .price{font-size:0.6rem;color:var(--text2)}@media(max-width:500px){aside{display:none}main{padding:12px}}
</style>
</head>
<body>
<div id="app">
<nav>
<div class="nav-logo" onclick="location.href='coinflip.html'">FRESH<b>FLIP</b></div>
<div class="nav-balance"><span>Balance</span><strong id="nav-balance">$0</strong></div>
<div class="nav-right"><span class="nav-user" id="nav-user"></span><button class="logout-btn" onclick="Session.logout()">Sign Out</button></div>
</nav>
<div class="layout">
<aside>
<div class="sidebar-section">Games</div>
<div class="sidebar-item" onclick="location.href='coinflip.html'"><span class="icon">C</span>Coin Flip</div>
<div class="sidebar-item" onclick="location.href='mines.html'"><span class="icon">M</span>Mines</div>
<div class="sidebar-item active"><span class="icon">R</span>Roulette</div>
<div class="sidebar-section">Account</div>
<div class="sidebar-item" onclick="location.href='referral.html'"><span class="icon">+</span>Referral</div>
</aside>
<main>
<div class="game-container">
<div class="page-header"><h2>Roulette</h2><p>Open cases to win - spin for rarities</p></div>
<div class="card">
<div class="card-title">Select Case</div>
<div class="case-select"><div class="case-option active" data-case="basic" onclick="selectCase('basic')"><div class="name">Basic</div><div class="price">$10+</div></div><div class="case-option" data-case="premium" onclick="selectCase('premium')"><div class="name">Premium</div><div class="price">$100+</div></div><div class="case-option" data-case="elite" onclick="selectCase('elite')"><div class="name">Elite</div><div class="price">$1000+</div></div></div>
<div class="roulette-track"><div class="roulette-indicator"></div><div class="roulette-strip" id="roulette-strip"></div></div>
</div>
<div class="card">
<span class="bet-label">Bet Amount</span>
<div class="bet-input-wrap"><span class="bet-currency">$</span><input class="bet-input" id="case-bet" type="number" placeholder="0"></div>
<div class="bet-quick"><button onclick="setBet('case-bet',10)">$10</button><button onclick="setBet('case-bet',50)">$50</button><button onclick="setBet('case-bet',100)">$100</button><button onclick="halfBet('case-bet')">1/2</button><button onclick="doubleBet('case-bet')">2x</button></div>
<button class="play-btn" id="case-btn" onclick="openCase()">OPEN CASE</button>
<div class="result-box" id="case-result"><div class="result-amount" id="case-result-amount"></div><div class="result-msg" id="case-result-msg"></div></div>
</div>
</div>
</main>
</div>
</div>
<script src="../js/auth.js"></script>
<script>
let caseType='basic',caseSpinning=false;
const CASE_ITEMS={basic:[{name:'Common',rarity:'common',multi:1},{name:'Uncommon',rarity:'uncommon',multi:2},{name:'Rare',rarity:'rare',multi:4},{name:'Epic',rarity:'epic',multi:8},{name:'Legendary',rarity:'legendary',multi:20}],premium:[{name:'Common',rarity:'common',multi:1},{name:'Uncommon',rarity:'uncommon',multi:3},{name:'Rare',rarity:'rare',multi:6},{name:'Epic',rarity:'epic',multi:15},{name:'Legendary',rarity:'legendary',multi:40}],elite:[{name:'Uncommon',rarity:'uncommon',multi:2},{name:'Rare',rarity:'rare',multi:5},{name:'Epic',rarity:'epic',multi:12},{name:'Legendary',rarity:'legendary',multi:30},{name:'Ultimate',rarity:'legendary',multi:100}]};
const CASE_WEIGHTS={basic:[55,28,12,4,1],premium:[45,30,15,8,2],elite:[35,30,20,10,5]};
async function init(){await Session.init();if(!Session.isLoggedIn()){location.href='../login.html';return}document.getElementById('app').style.display='flex';document.getElementById('nav-user').textContent=window.currentUser.username;updateBalanceUI(window.balance);buildRouletteItems();}
function selectCase(c){caseType=c;document.querySelectorAll('.case-option').forEach(el=>el.classList.toggle('active',el.dataset.case===c));buildRouletteItems();}
function buildRouletteItems(){const strip=document.getElementById('roulette-strip');if(!strip)return;strip.innerHTML='';const items=CASE_ITEMS[caseType];items.forEach(item=>{const el=document.createElement('div');el.className='roulette-item '+item.rarity;el.innerHTML='<span class="name">'+item.name+'</span>';strip.appendChild(el);});for(let i=0;i<10;i++){items.forEach(item=>{const el=document.createElement('div');el.className='roulette-item '+item.rarity;el.innerHTML='<span class="name">'+item.name+'</span>';strip.appendChild(el);});}}
async function openCase(){const bet=getBet('case-bet');if(!bet||bet<1){alert('Enter a valid bet.');return}if(bet>window.balance){alert('Insufficient balance.');return}if(caseSpinning)return;caseSpinning=true;const btn=document.getElementById('case-btn');btn.disabled=true;updateBalanceUI(window.balance-bet);const items=CASE_ITEMS[caseType];const weights=CASE_WEIGHTS[caseType];const total=weights.reduce((a,b)=>a+b,0);let rand=Math.random()*total,winnerIdx=0;for(let i=0;i<weights.length;i++){rand-=weights[i];if(rand<=0){winnerIdx=i;break;}}if(!biasedWin())winnerIdx=Math.floor(Math.random()*Math.min(2,items.length));const winner=items[winnerIdx];const won=Math.floor(bet*winner.multi);const strip=document.getElementById('roulette-strip');strip.style.transition='none';strip.style.left='0px';const itemWidth=54,targetPos=-(winnerIdx*itemWidth)+85,extraSpins=5*items.length*itemWidth;await sleep(50);strip.style.transition='left 2.5s cubic-bezier(0.15, 0.85, 0.25, 1)';strip.style.left='-'+(extraSpins+Math.abs(targetPos))+'px';await sleep(2600);if(won>0){updateBalanceUI(window.balance+won);showResult('case',true,won-bet,winner.name+' ('+winner.multi+'x)!')}else{showResult('case',false,bet,winner.name+' (lost)');}await Session.saveBalance();caseSpinning=false;btn.disabled=false;}
init();
</script>
</body>
</html>
