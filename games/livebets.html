<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Live Bets</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0f0f13; --bg2: #1a1a23; --bg3: #222230; --accent: #00ff88; --red: #ff4757; --gold: #ffd700; --text: #fff; --text2: #888; --border: #2a2a35; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; }
.logo { font-size: 1.5rem; font-weight: 700; padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.logo span { color: var(--accent); }
.nav-section { padding: 0 16px; margin-bottom: 20px; }
.nav-label { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
.nav-link { display: block; padding: 10px 12px; border-radius: 8px; color: var(--text); text-decoration: none; font-size: 0.9rem; transition: all 0.2s; cursor: pointer; }
.nav-link:hover { background: var(--bg3); }
.nav-link.active { background: var(--accent); color: #000; }
.main { flex: 1; padding: 30px; overflow-y: auto; }
.header-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.balance { display: flex; align-items: center; gap: 12px; }
.balance-label { color: var(--text2); font-size: 0.75rem; }
.balance-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
.page-header { margin-bottom: 30px; }
.page-header h1 { font-size: 2rem; margin-bottom: 8px; }
.page-header p { color: var(--text2); }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
.stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }

.filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn { padding: 10px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 0.85rem; }
.filter-btn:hover { border-color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

.live-bets-table { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-header { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; padding: 16px 20px; background: var(--bg3); font-size: 0.75rem; color: var(--text2); text-transform: uppercase; }
.bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.bet-row:last-child { border-bottom: none; }
.bet-user { font-weight: 600; }
.bet-game { color: var(--text2); }
.bet-amount { color: var(--accent); font-weight: 600; }
.bet-result.win { color: var(--accent); }
.bet-result.loss { color: var(--red); }

@media(max-width: 768px) { .sidebar { display: none; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">FRESH<span>FLIP</span></div>
    <div class="nav-section">
      <div class="nav-label">Games</div>
      <a class="nav-link" href="mines.html">Mines</a>
      <a class="nav-link" href="crash.html">Crash</a>
      <a class="nav-link" href="hilo.html">HiLo</a>
      <a class="nav-link" href="dice.html">Dice</a>
      <a class="nav-link" href="coinflip.html">Coinflip</a>
      <a class="nav-link" href="chicken.html">Chicken</a>
      <a class="nav-link" href="tower.html">Dragon Tower</a>
      <a class="nav-link" href="wheel.html">Wheel</a>
      <a class="nav-link" href="plinko.html">Plinko</a>
      <a class="nav-link" href="blackjack.html">Blackjack</a>
      <a class="nav-link" href="keno.html">Keno</a>
      <a class="nav-link" href="limbo.html">Limbo</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a class="nav-link active" href="livebets.html">Live Bets</a>
      <a class="nav-link" href="referral.html">Referrals</a>
      <a class="nav-link" href="daily.html">Daily Rewards</a>
    </div>
  </div>
  <div class="main">
    <div class="page-header">
      <h1>Live Bets</h1>
      <p>See what others are betting in real-time</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="total-bets">0</div><div class="stat-label">Total Bets</div></div>
      <div class="stat-card"><div class="stat-value" id="wagered-today">$0</div><div class="stat-label">Wagered Today</div></div>
      <div class="stat-card"><div class="stat-value" id="wins-today">$0</div><div class="stat-label">Wins Today</div></div>
      <div class="stat-card"><div class="stat-value" id="players-online">0</div><div class="stat-label">Players Online</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('mines')">Mines</button>
      <button class="filter-btn" onclick="setFilter('crash')">Crash</button>
      <button class="filter-btn" onclick="setFilter('dice')">Dice</button>
      <button class="filter-btn" onclick="filterGame('coinflip')">Coinflip</button>
      <button class="filter-btn" onclick="filterGame('wheel')">Wheel</button>
    </div>
    <div class="live-bets-table">
      <div class="table-header"><div>User</div><div>Game</div><div>Amount</div><div>Cashed</div><div>Result</div></div>
      <div id="bets-list"></div>
    </div>
  </div>
</div>
<script>
const mockBets = [
  { user: 'Player1', game: 'Mines', amount: 100, cashed: 250, result: 'win' },
  { user: 'Player2', game: 'Crash', amount: 500, cashed: 1250, result: 'win' },
  { user: 'Player3', game: 'Dice', amount: 50, cashed: 45, result: 'loss' },
  { user: 'Player4', game: 'Wheel', amount: 200, cashed: 0, result: 'loss' },
  { user: 'Player5', game: 'Mines', amount: 150, cashed: 450, result: 'win' },
  { user: 'Player6', game: 'Plinko', amount: 300, cashed: 900, result: 'win' },
];

let currentFilter = 'all';

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase().includes(filter)));
  renderBets();
}

function renderBets() {
  const list = document.getElementById('bets-list');
  list.innerHTML = '';
  const bets = currentFilter === 'all' ? mockBets : mockBets.filter(b => b.game.toLowerCase() === currentFilter);
  bets.forEach(bet => {
    list.innerHTML += `<div class="bet-row"><div class="bet-user">${bet.user}</div><div class="bet-game">${bet.game}</div><div class="bet-amount">$${bet.amount}</div><div class="bet-cashed">$${bet.cashed}</div><div class="bet-result ${bet.result}">${bet.result.toUpperCase()}</div></div>`;
  });
  document.getElementById('total-bets').textContent = mockBets.length;
  document.getElementById('players-online').textContent = Math.floor(Math.random() * 50) + 20;
}

renderBets();
setInterval(renderBets, 5000);
</script>
</body>
</html>
