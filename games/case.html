<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Case Open</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e14;
  --bg2: #0d1117;
  --bg3: #111820;
  --surface: #161f2a;
  --surface2: #1a2633;
  --surface3: #1e2d3d;
  --border: #252f3f;
  --border2: #2d3a4a;
  --accent: #00ff88;
  --accent2: #00cc6a;
  --accent-glow: rgba(0,255,136,0.15);
  --text: #e8f0f8;
  --text2: #8a9ab0;
  --text3: #5a6a7a;
  --red: #ff4466;
  --gold: #ffcc00;
  --blue: #4488ff;
  --purple: #a855f7;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

#app { display: none; flex-direction: column; min-height: 100vh; }

nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}

.nav-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo span { font-size: 1.6rem; }

.nav-balance {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 20px;
}

.nav-balance span {
  color: var(--text2);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-balance strong {
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-user {
  color: var(--text2);
  font-size: 0.88rem;
  font-weight: 500;
}

.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  transition: all 0.2s;
}

.logout-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

.layout { display: flex; flex: 1; }

aside {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  flex-shrink: 0;
}

.sidebar-section {
  color: var(--text3);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 20px;
  margin-bottom: 8px;
  margin-top: 16px;
}

.sidebar-section:first-child { margin-top: 0; }

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 0.92rem;
  font-weight: 500;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}

.sidebar-item:hover {
  color: var(--text);
  background: var(--surface2);
}

.sidebar-item.active {
  color: var(--accent);
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.sidebar-item .icon {
  width: 32px;
  height: 32px;
  background: var(--bg3);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.sidebar-item.active .icon {
  background: rgba(0,255,136,0.2);
}

main { flex: 1; padding: 28px; overflow-y: auto; background: var(--bg2); }

.game-header { margin-bottom: 24px; }

.game-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.game-header p { color: var(--text2); font-size: 0.85rem; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.bet-label {
  color: var(--text2);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.bet-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.2s;
}

.bet-input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.bet-currency {
  color: var(--text2);
  padding: 0 16px;
  font-size: 1rem;
  font-weight: 600;
}

.bet-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 0;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  outline: none;
}

.bet-quick {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.bet-quick button {
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  transition: all 0.2s;
}

.bet-quick button:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

.play-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #00ff88, #00cc6a);
  border: none;
  border-radius: 14px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
}

.play-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,255,136,0.3);
}

.play-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.result-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  text-align: center;
  display: none;
}

.result-box.win {
  background: var(--accent-glow);
  border: 1px solid rgba(0,255,136,0.3);
  display: block;
}

.result-box.lose {
  background: rgba(255,68,102,0.15);
  border: 1px solid rgba(255,68,102,0.3);
  display: block;
}

.result-amount {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}

.result-box.win .result-amount { color: var(--accent); }
.result-box.lose .result-amount { color: var(--red); }

.result-msg {
  color: var(--text2);
  font-size: 0.88rem;
  margin-top: 8px;
}

.case-container {
  position: relative;
  height: 200px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
}

.case-scroller {
  position: absolute;
  left: 0;
  right: 0;
  height: 100%;
  display: flex;
  align-items: center;
}

.case-item {
  flex-shrink: 0;
  width: 80px;
  height: 100px;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 4px;
  transition: transform 0.1s;
}

.case-item .item-rarity {
  font-size: 1.8rem;
  margin-bottom: 4px;
}

.case-item .item-name {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text2);
  text-align: center;
  padding: 0 4px;
}

.case-item.common { border-color: #8a9ab0; }
.case-item.uncommon { border-color: #4488ff; }
.case-item.rare { border-color: #a855f7; }
.case-item.epic { border-color: #ffcc00; }
.case-item.legendary { border-color: #ff4466; }

.case-item.common .item-name { color: #8a9ab0; }
.case-item.uncommon .item-name { color: #4488ff; }
.case-item.rare .item-name { color: #a855f7; }
.case-item.epic .item-name { color: var(--gold); }
.case-item.legendary .item-name { color: var(--red); }

.case-select {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.case-option {
  padding: 16px;
  background: var(--surface3);
  border: 2px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.case-option:hover {
  border-color: var(--accent);
}

.case-option.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.case-option .case-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.case-option .case-price {
  font-size: 0.75rem;
  color: var(--text2);
}

.case-item.winner {
  transform: scale(1.15);
  box-shadow: 0 0 30px rgba(255,204,0,0.5);
}

.winner-display {
  text-align: center;
  padding: 20px;
  display: none;
}

.winner-display.show {
  display: block;
}

.winner-display .winner-rarity {
  font-size: 3rem;
  margin-bottom: 8px;
}

.winner-display .winner-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.winner-display .winner-multi {
  font-size: 1rem;
  color: var(--gold);
}

@media(max-width: 700px) {
  aside { display: none; }
  main { padding: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-logo" onclick="window.location.href='coinflip.html'">
      <span>◆</span>FRESHFLIP
    </div>
    <div class="nav-balance">
      <span>Balance</span>
      <strong id="nav-balance">$0</strong>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="logout-btn" onclick="Session.logout()">Sign Out</button>
    </div>
  </nav>
  
  <div class="layout">
    <aside>
      <div class="sidebar-section">Games</div>
      <div class="sidebar-item" onclick="window.location.href='coinflip.html'">
        <span class="icon">🪙</span>Coin Flip
      </div>
      <div class="sidebar-item" onclick="window.location.href='mines.html'">
        <span class="icon">💣</span>Mines
      </div>
      <div class="sidebar-item" onclick="window.location.href='plinko.html'">
        <span class="icon">🎯</span>Plinko
      </div>
      <div class="sidebar-item" onclick="window.location.href='roulette.html'">
        <span class="icon">🎰</span>Roulette
      </div>
      <div class="sidebar-item active" onclick="window.location.href='case.html'">
        <span class="icon">📦</span>Case Open
      </div>
    </aside>
    
    <main>
      <div class="game-header">
        <h2>📦 Case Open</h2>
        <p>Open cases like CSGO - rare items worth more!</p>
      </div>
      
      <div class="card">
        <div class="card-title">Select Case</div>
        <div class="case-select">
          <div class="case-option active" data-case="basic" onclick="selectCase('basic')">
            <div class="case-name">Basic Case</div>
            <div class="case-price">$10+</div>
          </div>
          <div class="case-option" data-case="premium" onclick="selectCase('premium')">
            <div class="case-name">Premium Case</div>
            <div class="case-price">$100+</div>
          </div>
          <div class="case-option" data-case="elite" onclick="selectCase('elite')">
            <div class="case-name">Elite Case</div>
            <div class="case-price">$1000+</div>
          </div>
        </div>
        
        <span class="bet-label">Bet Amount</span>
        <div class="bet-input-wrap">
          <span class="bet-currency">$</span>
          <input class="bet-input" id="case-bet" type="number" placeholder="0" min="1">
        </div>
        <div class="bet-quick">
          <button onclick="setBet('case-bet',10)">$10</button>
          <button onclick="setBet('case-bet',50)">$50</button>
          <button onclick="setBet('case-bet',100)">$100</button>
          <button onclick="setBet('case-bet',500)">$500</button>
          <button onclick="halfBet('case-bet')">½</button>
          <button onclick="doubleBet('case-bet')">2×</button>
        </div>
        
        <button class="play-btn" id="case-open-btn" onclick="openCase()">OPEN CASE</button>
      </div>
      
      <div class="card">
        <div class="case-container" id="case-container">
          <div class="case-scroller" id="case-scroller"></div>
        </div>
        <div class="winner-display" id="winner-display">
          <div class="winner-rarity" id="winner-rarity"></div>
          <div class="winner-name" id="winner-name"></div>
          <div class="winner-multi" id="winner-multi"></div>
        </div>
        <div class="result-box" id="case-result">
          <div class="result-amount" id="case-result-amount"></div>
          <div class="result-msg" id="case-result-msg"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
const CASES = {
  basic: {
    items: [
      { name: 'Common', rarity: 'common', multi: 1, icon: '📦' },
      { name: 'Uncommon', rarity: 'uncommon', multi: 2, icon: '📦' },
      { name: 'Rare', rarity: 'rare', multi: 3, icon: '💎' },
      { name: 'Epic', rarity: 'epic', multi: 5, icon: '⭐' },
      { name: 'Legendary', rarity: 'legendary', multi: 10, icon: '👑' }
    ]
  },
  premium: {
    items: [
      { name: 'Common', rarity: 'common', multi: 1, icon: '📦' },
      { name: 'Uncommon', rarity: 'uncommon', multi: 2, icon: '💎' },
      { name: 'Rare', rarity: 'rare', multi: 5, icon: '⭐' },
      { name: 'Epic', rarity: 'epic', multi: 10, icon: '👑' },
      { name: 'Legendary', rarity: 'legendary', multi: 25, icon: '🔥' }
    ]
  },
  elite: {
    items: [
      { name: 'Uncommon', rarity: 'uncommon', multi: 1, icon: '💎' },
      { name: 'Rare', rarity: 'rare', multi: 3, icon: '⭐' },
      { name: 'Epic', rarity: 'epic', multi: 8, icon: '👑' },
      { name: 'Legendary', rarity: 'legendary', multi: 20, icon: '🔥' },
      { name: 'ULTIMATE', rarity: 'legendary', multi: 50, icon: '💯' }
    ]
  }
};

let currentCase = 'basic';
let caseSpinning = false;

const CASE_WEIGHTS = {
  basic: [60, 25, 10, 4, 1],
  premium: [50, 30, 12, 6, 2],
  elite: [40, 30, 15, 10, 5]
};

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) {
    window.location.href = '../login.html';
    return;
  }
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-user').textContent = window.currentUser.username;
  updateBalanceUI(window.balance);
  buildCase();
}

function selectCase(c) {
  currentCase = c;
  document.querySelectorAll('.case-option').forEach(opt => opt.classList.toggle('active', opt.dataset.case === c));
}

function buildCase() {
  const scroller = document.getElementById('case-scroller');
  scroller.innerHTML = '';
  const items = CASES[currentCase].items;
  
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = `case-item ${item.rarity}`;
    el.innerHTML = `<span class="item-rarity">${item.icon}</span><span class="item-name">${item.name}</span>`;
    scroller.appendChild(el);
  });
}

async function openCase() {
  const bet = getBet('case-bet');
  if (!bet || bet < 1) { alert('Enter a valid bet.'); return; }
  if (bet > window.balance) { alert('Not enough balance.'); return; }
  
  if (caseSpinning) return;
  caseSpinning = true;
  
  const btn = document.getElementById('case-open-btn');
  btn.disabled = true;
  updateBalanceUI(window.balance - bet);
  
  const scroller = document.getElementById('case-scroller');
  const items = CASES[currentCase].items;
  const weights = CASE_WEIGHTS[currentCase];
  const total = weights.reduce((a, b) => a + b, 0);
  
  let rand = Math.random() * total;
  let winner_idx = 0;
  for (let i = 0; i < weights.length; i++) {
    rand -= weights[i];
    if (rand <= 0) { winner_idx = i; break; }
  }
  
  if (!biasedWin()) {
    winner_idx = Math.floor(Math.random() * Math.min(2, items.length));
  }
  
  const winner = items[winner_idx];
  const won = Math.floor(bet * winner.multi);
  
  scroller.innerHTML = '';
  const totalItems = 30;
  for (let i = 0; i < totalItems; i++) {
    const item = items[i % items.length];
    const el = document.createElement('div');
    el.className = `case-item ${item.rarity}`;
    el.innerHTML = `<span class="item-rarity">${item.icon}</span><span class="item-name">${item.name}</span>`;
    if (i === totalItems - 1 - 3) el.classList.add('winner');
    scroller.appendChild(el);
  }
  
  const container = document.getElementById('case-container');
  const scrollAmount = (items.length * 3 + 3) * 88;
  scroller.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.2, 1)';
  scroller.style.transform = `translateX(-${scrollAmount}px)`;
  
  await sleep(4200);
  
  scroller.style.transition = 'none';
  scroller.style.transform = 'translateX(0)';
  
  document.getElementById('winner-rarity').textContent = winner.icon;
  document.getElementById('winner-name').textContent = winner.name;
  document.getElementById('winner-name').style.color = winner.rarity === 'legendary' ? 'var(--red)' : winner.rarity === 'epic' ? 'var(--gold)' : 'var(--text)';
  document.getElementById('winner-multi').textContent = `${winner.multi}x ($${won})`;
  
  if (won > 0) {
    updateBalanceUI(window.balance + won);
    showResult('case', true, won - bet, `Won ${winner.name} (${winner.multi}x)!`);
  } else {
    showResult('case', false, bet, `Got ${winner.name} but lost :(`);
  }
  
  await Session.saveBalance();
  caseSpinning = false;
  btn.disabled = false;
  
  setTimeout(() => buildCase(), 500);
}

init();
</script>
</body>
</html>
