<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Mines</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #1a1a23;
  --bg3: #222230;
  --accent: #00ff88;
  --text: #fff;
  --text2: #888;
  --border: #2a2a35;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  flex-shrink: 0;
}

.logo {
  font-size: 1.5rem;
  font-weight: 700;
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.logo span { color: var(--accent); }

.nav-section { padding: 0 16px; margin-bottom: 8px; }

.nav-label {
  font-size: 0.65rem;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.nav-link {
  display: block;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.nav-link:hover { background: var(--bg3); }

.nav-link.active { background: var(--accent); color: #000; }

.main { flex: 1; padding: 30px; overflow-y: auto; }

.game-header { margin-bottom: 30px; }
.game-header h1 { font-size: 2rem; margin-bottom: 8px; }
.game-header p { color: var(--text2); }

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.balance { display: flex; align-items: center; gap: 12px; }
.balance-label { color: var(--text2); font-size: 0.75rem; }
.balance-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

.user { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #000;
}

.game-content { max-width: 600px; }

.bet-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}

.select-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.select-btn {
  flex: 1;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  text-align: center;
  transition: all 0.2s;
}

.select-btn:hover { border-color: var(--accent); }
.select-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

.mines-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin: 20px 0;
}

.mine-cell {
  aspect-ratio: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.mine-cell:hover { border-color: var(--accent); }
.mine-cell.gem { background: var(--accent); color: #000; border-color: var(--accent); }
.mine-cell.mine { background: #ff4757; border-color: #ff4757; }

.bet-row { display: flex; gap: 10px; margin-bottom: 12px; }

.bet-btn {
  padding: 10px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
}

.bet-btn:hover { border-color: var(--accent); }

input[type="number"] {
  width: 100%;
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  margin-bottom: 12px;
  font-size: 1rem;
}

.play-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #000;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

.stats {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

.stat {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}

.stat-label { font-size: 0.7rem; color: var(--text2); }
.stat-value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

@media(max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">FRESH<span>FLIP</span></div>
    <div class="nav-section">
      <div class="nav-label">Games</div>
      <a href="mines.html" class="nav-link active">Mines</a>
      <a href="crash.html" class="nav-link">Crash</a>
      <a href="hilo.html" class="nav-link">HiLo</a>
      <a href="dice.html" class="nav-link">Dice</a>
      <a href="coinflip.html" class="nav-link">Coinflip</a>
      <a href="limbo.html" class="nav-link">Limbo</a>
      <a href="tower.html" class="nav-link">Dragon Tower</a>
      <a href="wheel.html" class="nav-link">Wheel</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="referral.html" class="nav-link">Referrals</a>
      <a href="daily.html" class="nav-link">Daily Rewards</a>
    </div>
  </div>
  
  <div class="main">
    <div class="header-bar">
      <div class="balance">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="balance">$0</span>
      </div>
      <div class="user">
        <span id="username">User</span>
        <div class="user-avatar" id="avatar">U</div>
      </div>
    </div>
    
    <div class="game-header">
      <h1>Mines</h1>
      <p>Click the safe tiles and avoid the mines to win!</p>
    </div>
    
    <div class="game-content">
      <div class="bet-section">
        <div class="select-row">
          <button class="select-btn active" onclick="setMines(3)">3</button>
          <button class="select-btn" onclick="setMines(5)">5</button>
          <button class="select-btn" onclick="setMines(10)">10</button>
        </div>
        
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Multiplier</div>
            <div class="stat-value" id="multi">1.00x</div>
          </div>
          <div class="stat">
            <div class="stat-label">Profit</div>
            <div class="stat-value" id="profit">$0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Gems</div>
            <div class="stat-value" id="gems">0</div>
          </div>
        </div>
        
        <div class="mines-grid" id="grid"></div>
        
        <button class="play-btn" id="play-btn" onclick="startGame()">START GAME</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
let minesCount = 3;
let gameActive = false;
let betAmount = 0;
let gemsFound = 0;
let board = [];

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) { location.href = '../login.html'; return; }
  document.getElementById('username').textContent = window.currentUser.username;
  document.getElementById('avatar').textContent = window.currentUser.username.charAt(0).toUpperCase();
  document.getElementById('balance').textContent = '$' + window.balance.toLocaleString();
  buildGrid();
}

function setMines(n) {
  minesCount = n;
  document.querySelectorAll('.select-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'mine-cell';
    cell.textContent = '?';
    cell.onclick = () => reveal(i);
    grid.appendChild(cell);
  }
}

function startGame() {
  const input = document.querySelector('input[type="number"]');
  betAmount = parseInt(input.value) || 0;
  if (!betAmount || betAmount < 1 || betAmount > window.balance) return;
  
  gameActive = true;
  gemsFound = 0;
  board = Array(25).fill(0);
  let placed = 0;
  while (placed < minesCount) {
    let i = Math.floor(Math.random() * 25);
    if (!board[i]) { board[i] = 1; placed++; }
  }
  
  updateBalanceUI(window.balance - betAmount);
  document.getElementById('play-btn').textContent = 'CASH OUT';
  document.getElementById('play-btn').onclick = cashOut;
  buildGrid();
  updateInfo();
}

function reveal(i) {
  if (!gameActive || board[i] === -1) return;
  
  const cells = document.querySelectorAll('.mine-cell');
  if (board[i] === 1) {
    cells[i].className = 'mine-cell mine';
    cells[i].textContent = 'X';
    gameActive = false;
    document.getElementById('play-btn').textContent = 'START GAME';
    document.getElementById('play-btn').onclick = startGame;
  } else {
    board[i] = -1;
    gemsFound++;
    cells[i].className = 'mine-cell gem';
    cells[i].textContent = '$';
    updateInfo();
  }
}

function updateInfo() {
  const mult = 1 + gemsFound * minesCount * 0.12;
  const profit = Math.floor(betAmount * mult) - betAmount;
  document.getElementById('multi').textContent = mult.toFixed(2) + 'x';
  document.getElementById('profit').textContent = '$' + profit;
  document.getElementById('gems').textContent = gemsFound;
}

function cashOut() {
  if (!gameActive) return;
  gameActive = false;
  const mult = 1 + gemsFound * minesCount * 0.12;
  const won = Math.floor(betAmount * mult);
  updateBalanceUI(window.balance + won);
  document.getElementById('play-btn').textContent = 'START GAME';
  document.getElementById('play-btn').onclick = startGame;
  Session.saveBalance();
}

init();
</script>
</body>
</html>
