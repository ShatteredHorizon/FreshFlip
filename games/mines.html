<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Mines</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e14;
  --bg2: #0d1117;
  --bg3: #111820;
  --surface: #161f2a;
  --surface2: #1a2633;
  --surface3: #1e2d3d;
  --border: #252f3f;
  --border2: #2d3a4a;
  --accent: #00ff88;
  --accent2: #00cc6a;
  --accent-glow: rgba(0,255,136,0.15);
  --text: #e8f0f8;
  --text2: #8a9ab0;
  --text3: #5a6a7a;
  --red: #ff4466;
  --gold: #ffcc00;
  --blue: #4488ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

#app { display: none; flex-direction: column; min-height: 100vh; }

nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.nav-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo span { font-size: 1.6rem; }

.nav-balance {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 20px;
}

.nav-balance span {
  color: var(--text2);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-balance strong {
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-user {
  color: var(--text2);
  font-size: 0.88rem;
  font-weight: 500;
}

.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  transition: all 0.2s;
}

.logout-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

.layout { display: flex; flex: 1; }

aside {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  flex-shrink: 0;
}

.sidebar-section {
  color: var(--text3);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 20px;
  margin-bottom: 8px;
  margin-top: 16px;
}

.sidebar-section:first-child { margin-top: 0; }

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 0.92rem;
  font-weight: 500;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}

.sidebar-item:hover {
  color: var(--text);
  background: var(--surface2);
}

.sidebar-item.active {
  color: var(--accent);
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.sidebar-item .icon {
  width: 32px;
  height: 32px;
  background: var(--bg3);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.sidebar-item.active .icon {
  background: rgba(0,255,136,0.2);
}

main { flex: 1; padding: 28px; overflow-y: auto; background: var(--bg2); }

.game-header { margin-bottom: 24px; }

.game-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.game-header p { color: var(--text2); font-size: 0.85rem; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.bet-label {
  color: var(--text2);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.bet-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.2s;
}

.bet-input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.bet-currency {
  color: var(--text2);
  padding: 0 16px;
  font-size: 1rem;
  font-weight: 600;
}

.bet-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 0;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  outline: none;
}

.bet-quick {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.bet-quick button {
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  transition: all 0.2s;
}

.bet-quick button:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

.play-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #00ff88, #00cc6a);
  border: none;
  border-radius: 14px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
}

.play-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,255,136,0.3);
}

.play-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.result-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  text-align: center;
  display: none;
}

.result-box.win {
  background: var(--accent-glow);
  border: 1px solid rgba(0,255,136,0.3);
  display: block;
}

.result-box.lose {
  background: rgba(255,68,102,0.15);
  border: 1px solid rgba(255,68,102,0.3);
  display: block;
}

.result-amount {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}

.result-box.win .result-amount { color: var(--accent); }
.result-box.lose .result-amount { color: var(--red); }

.result-msg {
  color: var(--text2);
  font-size: 0.88rem;
  margin-top: 8px;
}

.mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }

.mine-cell {
  aspect-ratio: 1;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  transition: all 0.15s;
}

.mine-cell:hover:not(.revealed) {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: scale(1.05);
}

.mine-cell.gem {
  border-color: var(--accent);
  background: rgba(0,255,136,0.15);
  color: var(--accent);
}

.mine-cell.bomb {
  border-color: var(--red);
  background: rgba(255,68,102,0.15);
  color: var(--red);
}

.mine-cell.revealed { cursor: default; transform: none !important; }

.mines-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }

.mines-stat { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }

.mines-stat label { color: var(--text2); font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px; }

.mines-stat strong { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent); }

.mines-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 12px;
  cursor: pointer;
}

.mines-select:focus { border-color: var(--accent); }

.cashout-btn {
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  background: var(--gold);
  border: none;
  border-radius: 12px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.cashout-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(255,204,0,0.3);
}

.cashout-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

@media(max-width: 700px) { aside { display: none; } main { padding: 16px; } }
</style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-logo" onclick="window.location.href='coinflip.html'"><span>◆</span>FRESHFLIP</div>
    <div class="nav-balance"><span>Balance</span><strong id="nav-balance">$0</strong></div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="logout-btn" onclick="Session.logout()">Sign Out</button>
    </div>
  </nav>
  
  <div class="layout">
    <aside>
      <div class="sidebar-section">Games</div>
      <div class="sidebar-item" onclick="window.location.href='coinflip.html'"><span class="icon">🪙</span>Coin Flip</div>
      <div class="sidebar-item active" onclick="window.location.href='mines.html'"><span class="icon">💣</span>Mines</div>
      <div class="sidebar-item" onclick="window.location.href='plinko.html'"><span class="icon">🎯</span>Plinko</div>
      <div class="sidebar-item" onclick="window.location.href='roulette.html'"><span class="icon">🎰</span>Roulette</div>
      <div class="sidebar-item" onclick="window.location.href='case.html'"><span class="icon">📦</span>Case Open</div>
    </aside>
    
    <main>
      <div class="game-header">
        <h2>💣 Mines</h2>
        <p>Reveal gems and cash out before hitting a mine!</p>
      </div>
      
      <div class="card">
        <div class="card-title">Game Settings</div>
        <span class="bet-label">Number of Mines</span>
        <select class="mines-select" id="mines-count">
          <option value="3">3 Mines</option>
          <option value="5" selected>5 Mines</option>
          <option value="10">10 Mines</option>
          <option value="15">15 Mines</option>
        </select>
        <span class="bet-label">Bet Amount</span>
        <div class="bet-input-wrap">
          <span class="bet-currency">$</span>
          <input class="bet-input" id="mines-bet" type="number" placeholder="0" min="1">
        </div>
        <div class="bet-quick">
          <button onclick="setBet('mines-bet',10)">$10</button>
          <button onclick="setBet('mines-bet',50)">$50</button>
          <button onclick="setBet('mines-bet',100)">$100</button>
          <button onclick="halfBet('mines-bet')">½</button>
          <button onclick="doubleBet('mines-bet')">2×</button>
        </div>
        <button class="play-btn" id="mines-start-btn" onclick="startMines()">START GAME</button>
      </div>
      
      <div class="card" id="mines-game-card" style="display:none">
        <div class="mines-stats">
          <div class="mines-stat"><label>Multiplier</label><strong id="mines-multi">1.00×</strong></div>
          <div class="mines-stat"><label>Profit</label><strong id="mines-profit">$0</strong></div>
          <div class="mines-stat"><label>Gems</label><strong id="mines-gems">0</strong></div>
        </div>
        <div class="mines-grid" id="mines-grid"></div>
        <button class="cashout-btn" id="mines-cashout" disabled onclick="cashoutMines()">CASH OUT</button>
        <div class="result-box" id="mines-result">
          <div class="result-amount" id="mines-result-amount"></div>
          <div class="result-msg" id="mines-result-msg"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
let minesActive = false, minesBoard = [], minesGemsFound = 0, minesBet = 0, minesCount = 0;

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) {
    window.location.href = '../login.html';
    return;
  }
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-user').textContent = window.currentUser.username;
  updateBalanceUI(window.balance);
}

function getMinesMulti(gems, mines) {
  if (gems === 0) return 1;
  return Math.max(1, parseFloat((1 + gems * mines * 0.12).toFixed(2)));
}

function buildMinesGrid(locked) {
  const grid = document.getElementById('mines-grid');
  grid.innerHTML = '';
  minesBoard.forEach((cell, i) => {
    const el = document.createElement('div');
    el.className = 'mine-cell' + (cell.revealed ? ' revealed ' + (cell.isMine ? 'bomb' : 'gem') : '');
    el.textContent = cell.revealed ? (cell.isMine ? '💣' : '💎') : '';
    if (!cell.revealed && !locked) el.onclick = () => revealCell(i);
    grid.appendChild(el);
  });
}

async function startMines() {
  const bet = getBet('mines-bet');
  if (!bet || bet < 1) { alert('Enter a valid bet.'); return; }
  if (bet > window.balance) { alert('Not enough balance.'); return; }
  
  minesBet = bet;
  minesCount = parseInt(document.getElementById('mines-count').value);
  minesGemsFound = 0;
  
  minesBoard = Array(25).fill(null).map(() => ({ isMine: false, revealed: false }));
  let placed = 0;
  while (placed < minesCount) {
    const i = Math.floor(Math.random() * 25);
    if (!minesBoard[i].isMine) { minesBoard[i].isMine = true; placed++; }
  }
  
  minesActive = true;
  updateBalanceUI(window.balance - minesBet);
  document.getElementById('mines-start-btn').disabled = true;
  document.getElementById('mines-game-card').style.display = 'block';
  document.getElementById('mines-result').className = 'result-box';
  document.getElementById('mines-cashout').disabled = false;
  updateMinesInfo();
  buildMinesGrid(false);
}

function revealCell(i) {
  if (!minesActive || minesBoard[i].revealed) return;
  
  const forceLose = !biasedWin() && minesGemsFound === 0;
  if (forceLose && !minesBoard[i].isMine) {
    minesBoard[i].isMine = true;
    for (let j = 0; j < 25; j++) {
      if (j !== i && minesBoard[j].isMine && !minesBoard[j].revealed) {
        minesBoard[j].isMine = false;
        break;
      }
    }
  }
  
  minesBoard[i].revealed = true;
  
  if (minesBoard[i].isMine) {
    minesBoard.forEach(c => c.revealed = true);
    buildMinesGrid(true);
    minesActive = false;
    document.getElementById('mines-start-btn').disabled = false;
    document.getElementById('mines-cashout').disabled = true;
    showResult('mines', false, minesBet, 'You hit a mine!');
    Session.saveBalance();
  } else {
    minesGemsFound++;
    updateMinesInfo();
    buildMinesGrid(false);
    if (25 - minesCount - minesGemsFound === 0) cashoutMines();
  }
}

function updateMinesInfo() {
  const multi = getMinesMulti(minesGemsFound, minesCount);
  const profit = Math.floor(minesBet * multi) - minesBet;
  document.getElementById('mines-multi').textContent = multi.toFixed(2) + '×';
  document.getElementById('mines-profit').textContent = '$' + profit;
  document.getElementById('mines-gems').textContent = minesGemsFound;
}

async function cashoutMines() {
  if (!minesActive) return;
  minesActive = false;
  const multi = getMinesMulti(minesGemsFound, minesCount);
  const won = Math.floor(minesBet * multi);
  updateBalanceUI(window.balance + won);
  document.getElementById('mines-start-btn').disabled = false;
  document.getElementById('mines-cashout').disabled = true;
  minesBoard.forEach(c => c.revealed = true);
  buildMinesGrid(true);
  showResult('mines', true, won - minesBet, 'Cashed out at ' + multi.toFixed(2) + '×!');
  await Session.saveBalance();
}

init();
</script>
</body>
</html>
