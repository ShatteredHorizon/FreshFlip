<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Wheel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0f12;--surface:#1a1f26;--bg2:#101418;--surface2:#222a34;--border:#343d4a;--accent:#00b060;--accent2:#009050;--text:#d0d8e0;--text2:#8898a8;--text3:#586878;--red:#d83848;--gold:#c89020}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}#app{display:none;flex-direction:column;min-height:100vh}nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}.logo{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:2px;cursor:pointer}.logo b{color:var(--accent)}.nav-balance{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 12px}.nav-balance span{color:var(--text2);font-size:0.65rem;font-weight:500;text-transform:uppercase}.nav-balance strong{color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700}.nav-right{display:flex;align-items:center;gap:12px}.nav-user{color:var(--text2);font-size:0.78rem}.logout-btn{background:0 0;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.7rem}.logout-btn:hover{border-color:var(--red);color:var(--red)}.layout{display:flex;flex:1}aside{width:180px;background:var(--surface);border-right:1px solid var(--border);padding:8px 0;flex-shrink:0}.sidebar-section{color:#586878;font-size:0.55rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0 12px;margin-bottom:5px;margin-top:8px}.sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;color:var(--text2);font-size:0.8rem;font-weight:500;transition:all .2s}.sidebar-item:hover{color:var(--text);background:var(--surface2)}.sidebar-item.active{color:var(--accent);background:rgba(0,176,96,0.1)}.sidebar-item .icon{width:22px;height:22px;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700}main{flex:1;padding:16px;overflow-y:auto;background:var(--bg2)}.game-container{max-width:480px;margin:0 auto}.page-header{margin-bottom:16px}.page-header h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700}.page-header p{color:var(--text2);font-size:0.75rem}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}.card-title{font-size:0.6rem;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}.bet-label{color:var(--text2);font-size:0.65rem;font-weight:500;text-transform:uppercase;margin-bottom:5px;display:block}.bet-input-wrap{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:5px;margin-bottom:6px}.bet-input-wrap:focus-within{border-color:var(--accent)}.bet-currency{color:var(--text2);padding:0 8px;font-size:0.8rem;font-weight:600}.bet-input{flex:1;background:0 0;border:none;padding:8px 0;color:var(--text);font-size:0.85rem;outline:0}.bet-quick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}.bet-quick button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:0.65rem;font-weight:500}.bet-quick button:hover{border-color:var(--accent);color:var(--accent)}.play-btn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:5px;color:#000;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}.play-btn:hover:not(:disabled){background:var(--accent2)}.play-btn:disabled{opacity:.4;cursor:not-allowed}.result-box{margin-top:10px;padding:12px;border-radius:5px;text-align:center;display:none}.result-box.win{background:rgba(0,176,96,0.1);border:1px solid rgba(0,176,96,0.3);display:block}.result-box.lose{background:rgba(216,56,72,0.1);border:1px solid rgba(216,56,72,0.3);display:block}.result-amount{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700}.result-box.win .result-amount{color:var(--accent)}.result-box.lose .result-amount{color:var(--red)}.result-msg{color:var(--text2);font-size:0.7rem;margin-top:3px}.wheel-container{display:flex;justify-content:center;margin:20px 0;position:relative}.wheel{width:280px;height:280px;border-radius:50%;background:var(--surface2);border:4px solid var(--border);position:relative;overflow:hidden}.wheel-segment{position:absolute;width:50%;height:50%;transform-origin:0 100%;left:50%;top:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:700}.wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:var(--bg);border:3px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;z-index:10}.pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:16px solid var(--accent);z-index:20}.segments{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin:12px 0}.seg{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:600}.seg.active{border-color:var(--accent);background:rgba(0,176,96,0.2)}.bet-sectors{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}.sector{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;cursor:pointer;transition:all .2s}.sector:hover{border-color:var(--accent)}.sector.active{border-color:var(--accent);background:rgba(0,176,96,0.15)}.sector .val{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700}.sector .lbl{font-size:0.55rem;color:var(--text2);text-transform:uppercase}@media(max-width:500px){aside{display:none}main{padding:12px}.wheel{width:240px;height:240px}}
</style>
</head>
<body>
<div id="app">
<nav>
<div class="logo" onclick="location.href='../index.html'">FRESH<b>FLIP</b></div>
<div class="nav-balance"><span>Balance</span><strong id="nav-balance">$0</strong></div>
<div class="nav-right"><span class="nav-user" id="nav-user"></span><button class="logout-btn" onclick="Session.logout()">Sign Out</button></div>
</nav>
<div class="layout">
<aside>
<div class="sidebar-section">Games</div>
<div class="sidebar-item" onclick="location.href='coinflip.html'"><span class="icon">C</span>Coin Flip</div>
<div class="sidebar-item" onclick="location.href='mines.html'"><span class="icon">M</span>Mines</div>
<div class="sidebar-item active"><span class="icon">W</span>Wheel</div>
<div class="sidebar-item" onclick="location.href='dice.html'"><span class="icon">D</span>Dice</div>
<div class="sidebar-item" onclick="location.href='tower.html'"><span class="icon">T</span>Dragon Tower</div>
<div class="sidebar-item" onclick="location.href='chicken.html'"><span class="icon">K</span>Chicken Cross</div>
<div class="sidebar-section">Account</div>
<div class="sidebar-item" onclick="location.href='referral.html'"><span class="icon">+</span>Referral</div>
</aside>
<main>
<div class="game-container">
<div class="page-header"><h2>Lucky Wheel</h2><p>Spin to win multipliers</p></div>
<div class="card">
<div class="card-title">Select Segment</div>
<div class="bet-sectors"><div class="sector active" data-seg="1" onclick="selectSeg(1)"><div class="val">1x</div><div class="lbl">Gray</div></div><div class="sector" data-seg="2" onclick="selectSeg(2)"><div class="val">2x</div><div class="lbl">Green</div></div><div class="sector" data-seg="3" onclick="selectSeg(3)"><div class="val">5x</div><div class="lbl">Blue</div></div><div class="sector" data-seg="4" onclick="selectSeg(4)"><div class="val">10x</div><div class="lbl">Red</div></div></div>
</div>
<div class="card">
<span class="bet-label">Bet Amount</span>
<div class="bet-input-wrap"><span class="bet-currency">$</span><input class="bet-input" id="wheel-bet" type="number" placeholder="0"></div>
<div class="bet-quick"><button onclick="setBet('wheel-bet',10)">$10</button><button onclick="setBet('wheel-bet',50)">$50</button><button onclick="setBet('wheel-bet',100)">$100</button><button onclick="halfBet('wheel-bet')">1/2</button><button onclick="doubleBet('wheel-bet')">2x</button></div>
<button class="play-btn" id="wheel-btn" onclick="spinWheel()">SPIN</button>
<div class="result-box" id="wheel-result"><div class="result-amount" id="wheel-result-amount"></div><div class="result-msg" id="wheel-result-msg"></div></div>
</div>
<div class="card">
<div class="wheel-container"><div class="pointer"></div><div class="wheel" id="wheel"><div class="wheel-center" id="wheel-center">?</div></div></div>
</div>
</div>
</main>
</div>
</div>
<script src="../js/auth.js"></script>
<script>
let selectedSeg=1,spinning=false;
const segMultipliers={1:1,2:2,3:5,4:10};
const segColors={1:'#8090a0',2:'#00b060',3:'#3870c8',4:'#d83848'};
async function init(){await Session.init();if(!Session.isLoggedIn()){location.href='../login.html';return}document.getElementById('app').style.display='flex';document.getElementById('nav-user').textContent=window.currentUser.username;updateBalanceUI(window.balance);}
function selectSeg(s){selectedSeg=s;document.querySelectorAll('.sector').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.seg)===s));}
async function spinWheel(){const bet=getBet('wheel-bet');if(!bet||bet<1){alert('Enter a valid bet.');return}if(bet>window.balance){alert('Insufficient balance.');return}if(spinning)return;spinning=true;const btn=document.getElementById('wheel-btn');btn.disabled=true;updateBalanceUI(window.balance-bet);const center=document.getElementById('wheel-center');let rot=0;const targetSeg=biasedWin()?selectedSeg:Math.floor(Math.random()*4)+1;const targetRot=1080+(selectedSeg-targetSeg)*90;const duration=3000;const startTime=Date.now();const animate=()=>{const elapsed=Date.now()-startTime;const progress=Math.min(elapsed/duration,1);const ease=(1-Math.pow(1-progress,3));rot=targetRot*ease;center.style.transform='translate(-50%,-50%) rotate('+rot+'deg)';center.textContent=selectedSeg;if(progress<1){requestAnimationFrame(animate);return;}const won=Math.floor(bet*segMultipliers[targetSeg]);if(won>0){updateBalanceUI(window.balance+won);showResult('wheel',true,won,'Landed on '+segMultipliers[targetSeg]+'x!');}else{showResult('wheel',false,bet,'Lost!');}spinning=false;btn.disabled=false;Session.saveBalance();};requestAnimationFrame(animate);}
init();
</script>
</body>
</html>
