<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Coin Flip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #1a1a23;
  --bg3: #222230;
  --accent: #00ff88;
  --text: #fff;
  --text2: #888;
  --border: #2a2a35;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
}

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  flex-shrink: 0;
}

.logo {
  font-size: 1.5rem;
  font-weight: 700;
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.logo span { color: var(--accent); }

.nav-section {
  padding: 0 16px;
  margin-bottom: 8px;
}

.nav-label {
  font-size: 0.65rem;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.nav-link {
  display: block;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.nav-link:hover {
  background: var(--bg3);
}

.nav-link.active {
  background: var(--accent);
  color: #000;
}

.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.game-header {
  margin-bottom: 30px;
}

.game-header h1 {
  font-size: 2rem;
  margin-bottom: 8px;
}

.game-header p {
  color: var(--text2);
}

.game-content {
  max-width: 500px;
}

.bet-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}

.bet-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.bet-btn {
  padding: 10px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}

.bet-btn:hover {
  border-color: var(--accent);
}

.bet-btn.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.play-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #000;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

.play-btn:hover {
  background: #00dd77;
}

.result {
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  display: none;
}

.result.show { display: block; }
.result.win { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--accent); }
.result.lose { background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; }

.result-amount {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.result.win .result-amount { color: var(--accent); }
.result.lose .result-amount { color: #ff4757; }

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.balance {
  display: flex;
  align-items: center;
  gap: 12px;
}

.balance-label {
  color: var(--text2);
  font-size: 0.75rem;
}

.balance-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
}

.user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #000;
}

.coin-display {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
}

.coin {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 700;
  border: 3px solid;
  background: var(--bg3);
}

.coin.heads {
  border-color: #ffd700;
  color: #ffd700;
}

.coin.tails {
  border-color: #3742fa;
  color: #3742fa;
}

@media(max-width: 768px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">FRESH<span>FLIP</span></div>
    
    <div class="nav-section">
      <div class="nav-label">Games</div>
      <a href="/mines" class="nav-link">Mines</a>
      <a href="/crash" class="nav-link">Crash</a>
      <a href="/hilo" class="nav-link">HiLo</a>
      <a href="/dice" class="nav-link">Dice</a>
      <a href="/coinflip" class="nav-link active">Coinflip</a>
      <a href="/limbo" class="nav-link">Limbo</a>
      <a href="/chicken" class="nav-link">Chicken</a>
      <a href="/tower" class="nav-link">Dragon Tower</a>
      <a href="/wheel" class="nav-link">Wheel</a>
    </div>
    
    <div class="nav-section">
      <div class="nav-label">Menu</div>
      <a href="/livebets" class="nav-link">Live Bets</a>
      <a href="/referrals" class="nav-link">Referrals</a>
      <a href="/daily" class="nav-link">Daily Rewards</a>
    </div>
  </div>
  
  <div class="main">
    <div class="header-bar">
      <div class="balance">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="balance">$0</span>
      </div>
      <div class="user">
        <span id="username">User</span>
        <div class="user-avatar" id="avatar">U</div>
      </div>
    </div>
    
    <div class="game-header">
      <h1>Coinflip</h1>
      <p>Pick a side and flip the coin! 1.85x payout on a win.</p>
    </div>
    
    <div class="game-content">
      <div class="bet-section">
        <div class="bet-row">
          <button class="bet-btn active" onclick="pickSide('heads')">Heads</button>
          <button class="bet-btn" onclick="pickSide('tails')">Tails</button>
        </div>
        
        <div class="coin-display">
          <div class="coin heads" id="coin">H</div>
        </div>
        
        <div class="bet-row">
          <button class="bet-btn" onclick="setBet(10)">+$10</button>
          <button class="bet-btn" onclick="setBet(50)">+$50</button>
          <button class="bet-btn" onclick="setBet(100)">+$100</button>
        </div>
        
        <input type="number" placeholder="Bet Amount" id="bet-input" style="width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:12px;font-size:1rem;">
        
        <button class="play-btn" onclick="play()">FLIP COIN</button>
      </div>
      
      <div class="result win" id="result">
        <div class="result-amount" id="result-amount">+$0</div>
        <div class="result-msg" id="result-msg">Won!</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
let side = 'heads';

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) { location.href = '../login.html'; return; }
  document.getElementById('username').textContent = window.currentUser.username;
  document.getElementById('avatar').textContent = window.currentUser.username.charAt(0).toUpperCase();
  document.getElementById('balance').textContent = '$' + window.balance.toLocaleString();
}

function pickSide(s) {
  side = s;
  document.querySelectorAll('.bet-row .bet-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === (s === 'heads' ? 0 : 1));
  });
  document.getElementById('coin').className = 'coin ' + s;
  document.getElementById('coin').textContent = s === 'heads' ? 'H' : 'T';
}

function setBet(amount) {
  const input = document.getElementById('bet-input');
  input.value = (parseInt(input.value) || 0) + amount;
}

async function play() {
  const bet = parseInt(document.getElementById('bet-input').value) || 0;
  if (!bet || bet < 1 || bet > window.balance) return;
  
  const result = document.getElementById('result');
  const coin = document.getElementById('coin');
  coin.style.transform = 'rotateY(720deg)';
  
  await new Promise(r => setTimeout(r, 600));
  
  const win = biasedWin();
  const outcome = win ? side : (side === 'heads' ? 'tails' : 'heads');
  coin.className = 'coin ' + outcome;
  coin.textContent = outcome === 'heads' ? 'H' : 'T';
  coin.style.transform = 'rotateY(0)';
  
  const won = win ? Math.floor(bet * 1.85) : 0;
  if (win) {
    updateBalanceUI(window.balance + won - bet);
    result.className = 'result show win';
    document.getElementById('result-amount').textContent = '+$' + won;
    document.getElementById('result-msg').textContent = 'Won!';
  } else {
    updateBalanceUI(window.balance - bet);
    result.className = 'result show lose';
    document.getElementById('result-amount').textContent = '-$' + bet;
    document.getElementById('result-msg').textContent = 'Lost!';
  }
  Session.saveBalance();
  document.getElementById('balance').textContent = '$' + window.balance.toLocaleString();
}

init();
</script>
</body>
</html>
