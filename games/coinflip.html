<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Coin Flip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-tertiary: #1a2332;
  --bg-card: #162032;
  --accent-primary: #00ff88;
  --accent-secondary: #00cc6a;
  --accent-glow: rgba(0, 255, 136, 0.4);
  --gold: #ffd700;
  --gold-dark: #b8860b;
  --red-bright: #ff3366;
  --blue-bright: #00d4ff;
  --text-primary: #ffffff;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-glow: rgba(0, 255, 136, 0.3);
  --gradient-primary: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
  --gradient-gold: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
  --shadow-glow: 0 0 30px rgba(0, 255, 136, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; }

#app { display: none; flex-direction: column; min-height: 100vh; }

header {
  background: rgba(22, 32, 50, 0.95);
  border-bottom: 1px solid var(--border-glow);
  padding: 12px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 3px;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  transition: all 0.3s;
}

.logo:hover { transform: scale(1.05); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.user-name {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.balance-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 0, 0, 0.3);
  padding: 8px 16px;
  border-radius: 50px;
  border: 2px solid var(--accent-primary);
}

.balance-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-primary);
}

.logout-btn {
  background: transparent;
  border: 1px solid var(--text-muted);
  color: var(--text-secondary);
  padding: 6px 14px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 0.7rem;
  font-weight: 600;
  transition: all 0.3s;
}

.logout-btn:hover {
  border-color: var(--red-bright);
  color: var(--red-bright);
}

main { flex: 1; padding: 30px 24px; max-width: 800px; margin: 0 auto; width: 100%; }

.game-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.game-subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.game-card {
  background: var(--bg-card);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}

.section-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.select-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.select-btn {
  flex: 1;
  padding: 14px;
  background: var(--bg-tertiary);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
}

.select-btn:hover {
  border-color: var(--accent-primary);
}

.select-btn.active {
  border-color: var(--accent-primary);
  background: rgba(0, 255, 136, 0.1);
}

.select-btn .label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.select-btn .sub {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.bet-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  margin-bottom: 12px;
  transition: all 0.3s;
}

.bet-input-wrap:focus-within {
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-glow);
}

.bet-currency {
  color: var(--text-secondary);
  padding: 0 14px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
}

.bet-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 0;
  color: var(--text-primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  outline: none;
}

.quick-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.quick-btn {
  padding: 8px 14px;
  background: var(--bg-tertiary);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
  transition: all 0.2s;
}

.quick-btn:hover {
  border-color: var(--accent-primary);
  color: var(--accent-primary);
}

.play-btn {
  width: 100%;
  padding: 16px;
  background: var(--gradient-primary);
  border: none;
  border-radius: 10px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: var(--shadow-glow);
}

.play-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px var(--accent-glow);
}

.play-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.coin-display {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
}

.coin {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  border: 4px solid;
  background: var(--bg-card);
  transition: all 0.3s;
}

.coin.heads {
  border-color: var(--gold);
  background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, var(--bg-card) 100%);
  color: var(--gold);
}

.coin.tails {
  border-color: var(--blue-bright);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, var(--bg-card) 100%);
  color: var(--blue-bright);
}

.coin.flipping {
  animation: flip-coin 0.6s ease-in-out;
}

@keyframes flip-coin {
  0% { transform: rotateY(0); }
  50% { transform: rotateY(900deg); }
  100% { transform: rotateY(1800deg); }
}

.result-box {
  margin-top: 16px;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  display: none;
}

.result-box.win {
  background: rgba(0, 255, 136, 0.1);
  border: 2px solid rgba(0, 255, 136, 0.3);
  display: block;
}

.result-box.lose {
  background: rgba(255, 51, 102, 0.1);
  border: 2px solid rgba(255, 51, 102, 0.3);
  display: block;
}

.result-amount {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
}

.result-box.win .result-amount { color: var(--accent-primary); }
.result-box.lose .result-amount { color: var(--red-bright); }

.result-msg {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-top: 6px;
}

@media(max-width: 600px) {
  .header-inner { flex-direction: column; gap: 12px; }
  .select-buttons { flex-direction: column; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo" onclick="location.href='../index.html'">FRESEFLIP</div>
      <div class="header-right">
        <span class="user-name" id="nav-user"></span>
        <div class="balance-display">
          <span class="balance-value" id="nav-balance">$0</span>
        </div>
        <button class="logout-btn" onclick="Session.logout()">Sign Out</button>
      </div>
    </div>
  </header>
  
  <main>
    <h1 class="game-title">Coin Flip</h1>
    <p class="game-subtitle">Pick heads or tails - double your bet</p>
    
    <div class="game-card">
      <p class="section-label">Choose Side</p>
      <div class="select-buttons">
        <div class="select-btn active" data-side="heads" onclick="selectSide('heads')">
          <div class="label">HEADS</div>
          <div class="sub">2x</div>
        </div>
        <div class="select-btn" data-side="tails" onclick="selectSide('tails')">
          <div class="label">TAILS</div>
          <div class="sub">2x</div>
        </div>
      </div>
      
      <div class="coin-display">
        <div class="coin heads" id="coin">H</div>
      </div>
      
      <p class="section-label">Bet Amount</p>
      <div class="bet-input-wrap">
        <span class="bet-currency">$</span>
        <input class="bet-input" id="cf-bet" type="number" placeholder="0">
      </div>
      <div class="quick-buttons">
        <button class="quick-btn" onclick="setBet('cf-bet',10)">$10</button>
        <button class="quick-btn" onclick="setBet('cf-bet',50)">$50</button>
        <button class="quick-btn" onclick="setBet('cf-bet',100)">$100</button>
        <button class="quick-btn" onclick="halfBet('cf-bet')">1/2</button>
        <button class="quick-btn" onclick="doubleBet('cf-bet')">2x</button>
      </div>
      <button class="play-btn" id="cf-btn" onclick="playCoinflip()">FLIP</button>
      
      <div class="result-box" id="cf-result">
        <div class="result-amount" id="cf-result-amount"></div>
        <div class="result-msg" id="cf-result-msg"></div>
      </div>
    </div>
  </main>
</div>

<script src="../js/auth.js"></script>
<script>
let cfSide = 'heads';

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) { location.href = '../login.html'; return; }
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-user').textContent = window.currentUser.username;
  updateBalanceUI(window.balance);
}

function selectSide(s) {
  cfSide = s;
  document.querySelectorAll('.select-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.side === s);
  });
  const coin = document.getElementById('coin');
  coin.className = 'coin ' + s;
  coin.textContent = s === 'heads' ? 'H' : 'T';
}

async function playCoinflip() {
  const bet = getBet('cf-bet');
  if (!bet || bet < 1) return;
  if (bet > window.balance) return;
  
  const btn = document.getElementById('cf-btn');
  btn.disabled = true;
  document.getElementById('cf-result').className = 'result-box';
  
  const coin = document.getElementById('coin');
  coin.className = 'coin flipping';
  
  await sleep(650);
  const win = biasedWin();
  const result = win ? cfSide : (cfSide === 'heads' ? 'tails' : 'heads');
  coin.className = 'coin ' + result;
  coin.textContent = result === 'heads' ? 'H' : 'T';
  
  if (win) {
    updateBalanceUI(window.balance + bet);
    showResult('cf', true, bet, 'Won!');
  } else {
    updateBalanceUI(window.balance - bet);
    showResult('cf', false, bet, 'Lost.');
  }
  await Session.saveBalance();
  btn.disabled = false;
}

init();
</script>
</body>
</html>
