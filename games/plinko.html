<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFlip - Plinko</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e14;
  --bg2: #0d1117;
  --bg3: #111820;
  --surface: #161f2a;
  --surface2: #1a2633;
  --surface3: #1e2d3d;
  --border: #252f3f;
  --border2: #2d3a4a;
  --accent: #00ff88;
  --accent2: #00cc6a;
  --accent-glow: rgba(0,255,136,0.15);
  --text: #e8f0f8;
  --text2: #8a9ab0;
  --text3: #5a6a7a;
  --red: #ff4466;
  --gold: #ffcc00;
  --blue: #4488ff;
  --purple: #a855f7;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

#app { display: none; flex-direction: column; min-height: 100vh; }

nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}

.nav-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo span { font-size: 1.6rem; }

.nav-balance {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 20px;
}

.nav-balance span {
  color: var(--text2);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-balance strong {
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-user {
  color: var(--text2);
  font-size: 0.88rem;
  font-weight: 500;
}

.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  transition: all 0.2s;
}

.logout-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

.layout { display: flex; flex: 1; }

aside {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  flex-shrink: 0;
}

.sidebar-section {
  color: var(--text3);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 20px;
  margin-bottom: 8px;
  margin-top: 16px;
}

.sidebar-section:first-child { margin-top: 0; }

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 0.92rem;
  font-weight: 500;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}

.sidebar-item:hover {
  color: var(--text);
  background: var(--surface2);
}

.sidebar-item.active {
  color: var(--accent);
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.sidebar-item .icon {
  width: 32px;
  height: 32px;
  background: var(--bg3);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.sidebar-item.active .icon {
  background: rgba(0,255,136,0.2);
}

main { flex: 1; padding: 28px; overflow-y: auto; background: var(--bg2); }

.game-header { margin-bottom: 24px; }

.game-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.game-header p { color: var(--text2); font-size: 0.85rem; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.bet-label {
  color: var(--text2);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.bet-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.2s;
}

.bet-input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.bet-currency {
  color: var(--text2);
  padding: 0 16px;
  font-size: 1rem;
  font-weight: 600;
}

.bet-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 0;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  outline: none;
}

.bet-quick {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.bet-quick button {
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  transition: all 0.2s;
}

.bet-quick button:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

.play-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #00ff88, #00cc6a);
  border: none;
  border-radius: 14px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
}

.play-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,255,136,0.3);
}

.play-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.result-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  text-align: center;
  display: none;
}

.result-box.win {
  background: var(--accent-glow);
  border: 1px solid rgba(0,255,136,0.3);
  display: block;
}

.result-box.lose {
  background: rgba(255,68,102,0.15);
  border: 1px solid rgba(255,68,102,0.3);
  display: block;
}

.result-amount {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}

.result-box.win .result-amount { color: var(--accent); }
.result-box.lose .result-amount { color: var(--red); }

.result-msg {
  color: var(--text2);
  font-size: 0.88rem;
  margin-top: 8px;
}

.plinko-board {
  width: 100%;
  height: 400px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  margin-bottom: 20px;
}

.plinko-pegs {
  position: absolute;
  inset: 0;
}

.plinko-peg {
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--surface3);
  border: 2px solid var(--border2);
  border-radius: 50%;
}

.plinko-drop {
  position: absolute;
  width: 18px;
  height: 18px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 20px var(--accent);
  transition: none;
}

.plinko-multipliers {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  height: 40px;
}

.multiplier-slot {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-top: 1px solid var(--border);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text2);
}

.multiplier-slot.high {
  background: rgba(0,255,136,0.15);
  color: var(--accent);
  border-top-color: var(--accent);
}

.multiplier-slot.medium {
  background: rgba(255,204,0,0.15);
  color: var(--gold);
  border-top-color: var(--gold);
}

.multiplier-slot.low {
  background: rgba(255,68,102,0.15);
  color: var(--red);
  border-top-color: var(--red);
}

.plinko-row-select {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.row-btn {
  flex: 1;
  min-width: 60px;
  padding: 12px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.row-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}

.row-btn.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}

.cashout-btn {
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  background: var(--gold);
  border: none;
  border-radius: 12px;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.cashout-btn:hover:not(:disabled) {
  background: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(255,204,0,0.3);
}

.cashout-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

@media(max-width: 700px) {
  aside { display: none; }
  main { padding: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-logo" onclick="window.location.href='coinflip.html'">
      <span>◆</span>FRESHFLIP
    </div>
    <div class="nav-balance">
      <span>Balance</span>
      <strong id="nav-balance">$0</strong>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="logout-btn" onclick="Session.logout()">Sign Out</button>
    </div>
  </nav>
  
  <div class="layout">
    <aside>
      <div class="sidebar-section">Games</div>
      <div class="sidebar-item" onclick="window.location.href='coinflip.html'">
        <span class="icon">🪙</span>Coin Flip
      </div>
      <div class="sidebar-item" onclick="window.location.href='mines.html'">
        <span class="icon">💣</span>Mines
      </div>
      <div class="sidebar-item" onclick="window.location.href='plinko.html'">
        <span class="icon">🎯</span>Plinko
      </div>
      <div class="sidebar-item" onclick="window.location.href='roulette.html'">
        <span class="icon">🎰</span>Roulette
      </div>
      <div class="sidebar-item" onclick="window.location.href='case.html'">
        <span class="icon">📦</span>Case Open
      </div>
    </aside>
    
    <main>
      <div class="game-header">
        <h2>🎯 Plinko</h2>
        <p>Drop the ball and multiply your bet! Higher multipliers = more risk.</p>
      </div>
      
      <div class="card">
        <div class="plinko-board" id="plinko-board">
          <div class="plinko-pegs" id="plinko-pegs"></div>
        </div>
        
        <div class="card-title">Rows</div>
        <div class="plinko-row-select">
          <button class="row-btn active" data-rows="8" onclick="setRows(8)">8</button>
          <button class="row-btn" data-rows="10" onclick="setRows(10)">10</button>
          <button class="row-btn" data-rows="12" onclick="setRows(12)">12</button>
          <button class="row-btn" data-rows="14" onclick="setRows(14)">14</button>
        </div>
        
        <span class="bet-label">Bet Amount</span>
        <div class="bet-input-wrap">
          <span class="bet-currency">$</span>
          <input class="bet-input" id="plinko-bet" type="number" placeholder="0" min="1">
        </div>
        <div class="bet-quick">
          <button onclick="setBet('plinko-bet',10)">$10</button>
          <button onclick="setBet('plinko-bet',50)">$50</button>
          <button onclick="setBet('plinko-bet',100)">$100</button>
          <button onclick="setBet('plinko-bet',500)">$500</button>
          <button onclick="halfBet('plinko-bet')">½</button>
          <button onclick="doubleBet('plinko-bet')">2×</button>
        </div>
        
        <button class="play-btn" id="plinko-drop-btn" onclick="dropPlinko()">DROP BALL</button>
        
        <div class="result-box" id="plinko-result">
          <div class="result-amount" id="plinko-result-amount"></div>
          <div class="result-msg" id="plinko-result-msg"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
const ROW_CONFIGS = {
  8: { pegs: 8, multipliers: [1.5, 2, 3, 5, 5, 3, 2, 1.5] },
  10: { pegs: 10, multipliers: [1, 1.5, 2, 3, 5, 5, 5, 3, 2, 1.5, 1] },
  12: { pegs: 12, multipliers: [0.5, 1, 1.5, 2, 3, 5, 10, 5, 3, 2, 1.5, 1, 0.5] },
  14: { pegs: 14, multipliers: [0.2, 0.5, 1, 1.5, 2, 3, 5, 10, 25, 10, 5, 3, 2, 1.5, 1, 0.5] }
};

let plinkoRows = 8;
let plinkoBet = 0;
let plinkoActive = false;
let ballElement = null;

async function init() {
  await Session.init();
  if (!Session.isLoggedIn()) {
    window.location.href = '../login.html';
    return;
  }
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-user').textContent = window.currentUser.username;
  updateBalanceUI(window.balance);
  buildBoard();
}

function setRows(r) {
  plinkoRows = r;
  document.querySelectorAll('.row-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.rows == r));
  buildBoard();
}

function buildBoard() {
  const board = document.getElementById('plinko-board');
  const pegsContainer = document.getElementById('plinko-pegs');
  pegsContainer.innerHTML = '';
  const config = ROW_CONFIGS[plinkoRows];
  const boardWidth = board.offsetWidth - 40;
  const boardHeight = board.offsetHeight - 60;
  constpegSpacing = boardWidth / (plinkoRows + 1);
  const rowSpacing = boardHeight / ((plinkoRows / 2) + 2);
  
  for (let row = 0; row < plinkoRows / 2; row++) {
    const offset = row % 2 === 0 ? 0 : pegSpacing / 2;
    for (let col = 0; col <= row; col++) {
      const peg = document.createElement('div');
      peg.className = 'plinko-peg';
      peg.style.left = (20 + offset + col * pegSpacing) + 'px';
      peg.style.top = (30 + row * rowSpacing) + 'px';
      pegsContainer.appendChild(peg);
    }
  }
}

function dropPlinko() {
  plinkoBet = getBet('plinko-bet');
  if (!plinkoBet || plinkoBet < 1) { alert('Enter a valid bet.'); return; }
  if (plinkoBet > window.balance) { alert('Not enough balance.'); return; }
  
  if (plinkoActive) return;
  plinkoActive = true;
  
  const btn = document.getElementById('plinko-drop-btn');
  btn.disabled = true;
  
  updateBalanceUI(window.balance - plinkoBet);
  
  const board = document.getElementById('plinko-board');
  const ball = document.createElement('div');
  ball.className = 'plinko-drop';
  ball.style.left = (board.offsetWidth / 2 - 9) + 'px';
  ball.style.top = '10px';
  board.appendChild(ball);
  ballElement = ball;
  
  animateBall();
}

async function animateBall() {
  const board = document.getElementById('plinko-board');
  const boardWidth = board.offsetWidth;
  const boardHeight = board.offsetHeight;
  let x = boardWidth / 2;
  let y = 10;
  let vx = 0;
  let vy = 0;
  const gravity = 0.4;
  const bounce = 0.6;
  let delay = 0;
  
  const config = ROW_CONFIGS[plinkoRows];
  const pegSpacing = boardWidth / (config.pegs + 1);
  const rowSpacing = boardHeight / ((plinkoRows / 2) + 2);
  
  animate();
  
  function animate() {
    const interval = setInterval(() => {
      vy += gravity;
      y += vy;
      x += vx;
      
      const row = Math.floor((y - 30) / rowSpacing);
      const expectedX = boardWidth / 2 + (Math.random() - 0.5) * 4;
      vx += (expectedX - x) * 0.02;
      vx *= 0.99;
      
      for (let r = 0; r < plinkoRows / 2; r++) {
        const offset = r % 2 === 0 ? 0 : pegSpacing / 2;
        for (let c = 0; c <= r; c++) {
          const pegX = 20 + offset + c * pegSpacing;
          const pegY = 30 + r * rowSpacing;
          const dx = x - pegX;
          const dy = y - pegY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 18) {
            const angle = Math.atan2(dy, dx);
            const speed = Math.sqrt(vx * vx + vy * vy) * bounce;
            vx = Math.cos(angle) * speed;
            vy = Math.sin(angle) * speed * 0.8;
            x = pegX + Math.cos(angle + 0.1) * 20;
            y = pegY + Math.sin(angle) * 20;
          }
        }
      }
      
      if (y > boardHeight - 50) {
        y = boardHeight - 50;
        const multiIndex = Math.floor((x / boardWidth) * config.multipliers.length);
        const clampedIndex = Math.max(0, Math.min(config.multipliers.length - 1, multiIndex));
        const multiplier = config.multipliers[clampedIndex];
        const won = Math.floor(plinkoBet * multiplier);
        
        clearInterval(interval);
        
        ballElement.remove();
        plinkoActive = false;
        
        if (biasedWin()) {
          updateBalanceUI(window.balance + won);
          showResult('plinko', true, won - plinkoBet, `Won ${multiplier}x!`);
        } else {
          showResult('plinko', false, plinkoBet, `Landed ${multiplier}x - $0`);
        }
        
        Session.saveBalance();
        document.getElementById('plinko-drop-btn').disabled = false;
        return;
      }
      
      ballElement.style.left = (x - 9) + 'px';
      ballElement.style.top = y + 'px';
      
      delay++;
      if (delay > 400) {
        clearInterval(interval);
        ballElement.remove();
        plinkoActive = false;
        document.getElementById('plinko-drop-btn').disabled = false;
      }
    }, 16);
  }
}

init();
</script>
</body>
</html>
